    function updateSkillFx(){
      GS.skillFx.forEach(fx=>{
        if(fx.kind === 'spark'){
          fx.x += fx.vx;
          fx.y += fx.vy;
          fx.vx *= 0.96;
          fx.vy *= 0.96;
        }else if(fx.kind === 'sprite'){
          fx.x += fx.driftX || 0;
          fx.y += fx.driftY || 0;
          fx.scale = (fx.scale == null ? 1 : fx.scale) + (fx.grow || 0);
          fx.rotation = (fx.rotation || 0) + (fx.spin || 0);
        }
        fx.life -= 1;
      });
      GS.skillFx = GS.skillFx.filter(fx=>fx.life > 0);
      GS.camShake *= 0.82;
      if(GS.camShake < 0.15) GS.camShake = 0;
    }
    function drawSkillFx(){
      if(!GS.skillFx.length) return;
      CTX.save();
      CTX.globalCompositeOperation = 'lighter';
      for(const fx of GS.skillFx){
        const t = 1 - (fx.life / Math.max(1, fx.maxLife || fx.life || 1));
        CTX.globalAlpha = Math.max(0.08, 1 - t * 0.9);
        if(fx.kind === 'sprite'){
          const px = fx.x - GS.camX;
          const scale = fx.scale == null ? 1 : fx.scale;
          const w = (fx.w || 120) * scale;
          const h = (fx.h || 120) * scale;
          const img = getConfiguredAsset('skills', fx.assetKey || fx.skillId || '');
          CTX.save();
          CTX.translate(px, fx.y);
          CTX.rotate(fx.rotation || 0);
          if(img){
            if(fx.flipX){
              CTX.scale(-1, 1);
              CTX.drawImage(img, -w * 0.5, -h * 0.5, w, h);
            }else{
              CTX.drawImage(img, -w * 0.5, -h * 0.5, w, h);
            }
          }else{
            const g = CTX.createRadialGradient(0, 0, 8, 0, 0, Math.max(w, h) * 0.45);
            g.addColorStop(0, fx.fallbackColor || '#ffffff');
            g.addColorStop(1, 'transparent');
            CTX.fillStyle = g;
            CTX.beginPath();
            CTX.ellipse(0, 0, w * 0.45, h * 0.28, 0, 0, Math.PI * 2);
            CTX.fill();
          }
          CTX.restore();
        }else if(fx.kind === 'spark'){
          CTX.fillStyle = fx.color;
          CTX.beginPath();
          CTX.arc(fx.x - GS.camX, fx.y, fx.r || 3, 0, Math.PI*2);
          CTX.fill();
        }else if(fx.kind === 'ring'){
          CTX.strokeStyle = fx.color;
          CTX.lineWidth = 4;
          CTX.beginPath();
          CTX.arc(fx.x - GS.camX, fx.y, (fx.radius || 24) * (0.5 + t), 0, Math.PI*2);
          CTX.stroke();
        }else if(fx.kind === 'slash'){
          const x = fx.x - GS.camX;
          CTX.strokeStyle = fx.color;
          CTX.lineWidth = 8;
          CTX.beginPath();
          CTX.arc(x, fx.y, (fx.size || 84) * (0.3 + t * 0.4), fx.facing > 0 ? -0.8 : Math.PI - 0.8, fx.facing > 0 ? 0.8 : Math.PI + 0.8);
          CTX.stroke();
        }else if(fx.kind === 'beam'){
          CTX.strokeStyle = fx.color;
          CTX.lineWidth = Math.max(2, (fx.width || 6) * (1 - t * 0.65));
          CTX.beginPath();
          CTX.moveTo(fx.x1 - GS.camX, fx.y1);
          CTX.lineTo(fx.x2 - GS.camX, fx.y2);
          CTX.stroke();
        }else if(fx.kind === 'aura'){
          const r = (fx.radius || 36) * (0.65 + t * 0.6);
          const g = CTX.createRadialGradient(fx.x - GS.camX, fx.y, 4, fx.x - GS.camX, fx.y, r);
          g.addColorStop(0, fx.color);
          g.addColorStop(1, 'transparent');
          CTX.fillStyle = g;
          CTX.beginPath();
          CTX.arc(fx.x - GS.camX, fx.y, r, 0, Math.PI*2);
          CTX.fill();
        }else if(fx.kind === 'nova'){
          CTX.strokeStyle = fx.color;
          CTX.lineWidth = 6;
          CTX.beginPath();
          CTX.arc(fx.x - GS.camX, fx.y, (fx.radius || 120) * (0.35 + t * 0.7), 0, Math.PI*2);
          CTX.stroke();
        }else if(fx.kind === 'trail'){
          CTX.fillStyle = fx.color;
          CTX.fillRect(fx.x - GS.camX - (fx.size || 60)/2, fx.y - 10, fx.size || 60, 20);
        }
      }
      CTX.restore();
      CTX.globalAlpha = 1;
    }

    function rollMonsterDrops(mon){
      const table = DROP_TABLE[mon.kind] || [];
      table.forEach(r=>{
        if(Math.random() < r.chance){
          const qty = irand(r.min||1, r.max||1);
          GS.worldDrops.push({itemId:r.itemId,qty,x:mon.x + mon.w*.5,y:mon.y,vx:rand(-1.8,1.8),vy:-2.5,life:1800});
        }
      });
      P.meso += irand(2, 8 + Math.max(1, mon.exp));
    }

    function scheduleRespawn(mon){
      GS.respawnQueue.push({mapId:P.map_id,kind:mon.kind,x:mon.x,y:mon.baseY ?? mon.y,at:performance.now() + irand(7000, 13000)});
    }
    function giveExp(v){
      P.exp += v;
      while(P.exp >= expToNext(P.level)){
        P.exp -= expToNext(P.level);
        P.level += 1;
        P.max_hp += 10;
        P.max_mp += 4;
        P.atk += 2;
        P.def += 1;
        P.hp = getTotalMaxHp();
        P.mp = getTotalMaxMp();
        spawnHitText(P.pos_x + 8, P.pos_y - 18, `LEVEL UP! ${P.level}`, '#ffcf4d');
        pushChatMessage('SYSTEM', `${P.name || 'Player'} が Lv.${P.level} になりました。`, 'system');
        savePlayer();
      }
    }

    function hitMonster(mon, dmg, color='#fff'){
      mon.hp -= dmg;
      mon.hitCd = 6;
      mon.vx += P.facing * 1.8;
      spawnHitText(mon.x + mon.w*.5, mon.y - 8, `-${dmg}`, color);
      spawnImpactFx(mon.x + mon.w*.5, mon.y + mon.h*.5, color, 24);
      if(mon.hp <= 0){
        mon.dead = true;
        P.progress.kills[mon.kind] = Number(P.progress.kills[mon.kind] || 0) + 1;
        advanceQuestObjective('killMonster', mon.kind, 1);
        giveExp(mon.exp);
        rollMonsterDrops(mon);
        scheduleRespawn(mon);
        spawnHitText(mon.x + mon.w*.5, mon.y - 20, `+${mon.exp} EXP`, '#67e8f9');
        pushChatMessage('SYSTEM', `${mon.kind.toUpperCase()} を倒した。`, 'system');
        savePlayer();
      }
    }

    function damagePlayer(monAtk){
      if(P.invuln > 0) return;
      const dmg = Math.max(1, Math.round(monAtk - getTotalDef()*0.35));
      P.hp = clamp(P.hp - dmg, 0, getTotalMaxHp());
      P.invuln = 50;
      spawnHitText(P.pos_x + P.w*.5, P.pos_y - 12, `-${dmg}`, '#ff6b78');
      if(P.hp <= 0){
        P.hp = Math.max(1, Math.floor(getTotalMaxHp() * .4));
        P.mp = Math.max(0, Math.floor(getTotalMaxMp() * .4));
        const safe = MAPS.z01_m01;
        pushChatMessage('SYSTEM', '力尽きたため草原の入口に戻されました。', 'system');
        loadMap(safe.id, 160, 390);
        savePlayer();
      }
    }

    function basicAttack(){
      if(GS.scene !== 'play' || GS.inventoryOpen || P.attackCd > 0) return;
      P.attackCd = 22;
      P.attackFlash = 5;
      const rangeW = 70;
      const hitX = P.facing > 0 ? P.pos_x + P.w : P.pos_x - rangeW;
      const hitBox = {x:hitX, y:P.pos_y + 10, w:rangeW, h:34};
      spawnSlashFx(P.pos_x + P.w*0.5 + P.facing*38, P.pos_y + 24, P.facing, '#fff', 72);
      monsters.forEach(mon=>{
        if(mon.dead) return;
        if(hitBox.x + hitBox.w > mon.x && hitBox.x < mon.x + mon.w && hitBox.y + hitBox.h > mon.y && hitBox.y < mon.y + mon.h){
          const dmg = Math.max(1, Math.round(getTotalAtk() - mon.def + rand(0,5)));
          hitMonster(mon, dmg, '#fff');
        }
      });
      monsters = monsters.filter(m=>!m.dead);
    }

    function useSkillSlot(index){
      if(GS.scene !== 'play' || GS.inventoryOpen) return;
      const skill = getActiveSkills()[index];
      if(!skill) return;
      if((P.skillCooldowns[skill.id] || 0) > performance.now()) return liMsg(`${skill.name} はクールダウン中です。`);
      if(P.mp < skill.mp) return liMsg('MPが足りません。');
      const cx = P.pos_x + P.w * 0.5;
      const cy = P.pos_y + P.h * 0.5;
      P.mp = clamp(P.mp - skill.mp, 0, getTotalMaxMp());
      P.skillCooldowns[skill.id] = performance.now() + skill.cd;
      P.attackFlash = 7;
      const frontX = P.facing > 0 ? P.pos_x + P.w : P.pos_x - (skill.range || 100);
      const hitRange = {x:frontX, y:P.pos_y - 8, w:skill.range || 100, h:P.h + 18};

      playSkillAnimation(skill, { cx, cy });

      if(skill.type === 'front' || skill.type === 'multi_front'){
        monsters.forEach(mon=>{
          if(mon.dead) return;
          if(hitRange.x + hitRange.w > mon.x && hitRange.x < mon.x + mon.w && hitRange.y + hitRange.h > mon.y && hitRange.y < mon.y + mon.h){
            const hits = skill.type === 'multi_front' ? (skill.hits || 2) : 1;
            for(let i=0;i<hits;i++){
              const dmg = Math.max(1, Math.round(getTotalAtk() * skill.power - mon.def + rand(0,4)));
              hitMonster(mon, dmg, skill.color || '#fff');
              if(skill.type === 'multi_front') spawnImpactFx(mon.x + mon.w*.5 + rand(-8,8), mon.y + mon.h*.5 + rand(-8,8), skill.color || '#fff', 20);
              if(mon.dead) break;
            }
          }
        });
      } else if(skill.type === 'heal') {
        P.hp = clamp(P.hp + (skill.heal || 0), 0, getTotalMaxHp());
        spawnHitText(P.pos_x + P.w*.5, P.pos_y - 18, `+${skill.heal} HP`, '#64df96');
      } else if(skill.type === 'mp_restore') {
        P.mp = clamp(P.mp + (skill.restore || 0), 0, getTotalMaxMp());
        spawnHitText(P.pos_x + P.w*.5, P.pos_y - 18, `+${skill.restore} MP`, '#9ef7ff');
      } else if(skill.type === 'dash') {
        P.pos_x = clamp(P.pos_x + P.facing * (skill.range || 80), 0, currentMap.width - P.w);
        monsters.forEach(mon=>{
          if(mon.dead) return;
          if(Math.abs((mon.x + mon.w*.5) - (P.pos_x + P.w*.5)) < 68 && Math.abs(mon.y - P.pos_y) < 70){
            const dmg = Math.max(1, Math.round(getTotalAtk() * (skill.power || 1.1) - mon.def + rand(0,4)));
            hitMonster(mon, dmg, skill.color || '#fff');
          }
        });
      } else if(skill.type === 'buff_def') {
        P.buffs.defAmount = skill.amount || 0;
        P.buffs.defUntil = performance.now() + (skill.duration || 3000);
        spawnHitText(P.pos_x + P.w*.5, P.pos_y - 18, 'DEF UP', '#8cd3ff');
      } else if(skill.type === 'buff_speed') {
        P.buffs.speedFactor = skill.amount || 1.1;
        P.buffs.speedUntil = performance.now() + (skill.duration || 3000);
        spawnHitText(P.pos_x + P.w*.5, P.pos_y - 18, 'SPD UP', '#7ee7d3');
      } else if(skill.type === 'burst') {
        monsters.forEach(mon=>{
          if(mon.dead) return;
          if(Math.abs((mon.x + mon.w*.5) - (P.pos_x + P.w*.5)) < (skill.range || 90) && Math.abs((mon.y + mon.h*.5) - (P.pos_y + P.h*.5)) < (skill.range || 90)){
            const dmg = Math.max(1, Math.round(getTotalAtk() * skill.power - mon.def + rand(0,4)));
            hitMonster(mon, dmg, skill.color || '#fff');
          }
        });
      }
      liMsg(`${skill.name} 発動`, true);
      savePlayer();
      monsters = monsters.filter(m=>!m.dead);
    }

    function tryPortal(){
      for(const po of currentMap.portals){
        if(P.pos_x + P.w > po.x && P.pos_x < po.x + po.w && P.pos_y + P.h > po.y && P.pos_y < po.y + po.h){
          loadMap(po.to, po.tx, po.ty);
          pushChatMessage('SYSTEM', `${MAPS[po.to]?.name || po.to} に移動しました。`, 'system');
          savePlayer(true);
          break;
        }
      }
    }

    function updatePlayer(){
      const left = GS.keys['ArrowLeft'] || GS.keys['KeyA'] || GS.mobile.left;
      const right = GS.keys['ArrowRight'] || GS.keys['KeyD'] || GS.mobile.right;
      const wantJump = GS.keys['ArrowUp'] || GS.keys['KeyW'] || GS.keys['Space'] || GS.mobile.jump;
      let move = 0;
      if(left) move -= 1;
      if(right) move += 1;
      if(move !== 0) P.facing = move;
      const moveSpeed = 3.3 * getBuffBonus().speed;
      const target = move * moveSpeed;
      P.vx += (target - P.vx) * 0.22;
      if(Math.abs(P.vx) < .03) P.vx = 0;
      if(wantJump && P.onGround){ P.vy = -9.3; P.onGround=false; }
      P.vy += 0.42;
      P.vy = Math.min(P.vy, 11);
      P.pos_x += P.vx;
      P.pos_y += P.vy;
      P.pos_x = clamp(P.pos_x, 0, currentMap.width - P.w);
      resolvePlayerPlatforms();
      tryPortal();
      P.hp = clamp(P.hp, 0, getTotalMaxHp());
      P.mp = clamp(P.mp + 0.01, 0, getTotalMaxMp());
      if(P.attackCd > 0) P.attackCd--;
      if(P.invuln > 0) P.invuln--;
      if(P.attackFlash > 0) P.attackFlash--;
      GS.camX = clamp(P.pos_x - CVS.width * .5, 0, Math.max(0,currentMap.width - CVS.width));
    }

    function updateMonsters(){
      monsters.forEach(mon=>{
        if(mon.fly){
          mon.x += mon.vx;
          if(mon.x < 40 || mon.x > currentMap.width - 40 - mon.w) mon.vx *= -1;
          mon.y = mon.baseY + Math.sin((performance.now() + mon.x)*0.004) * 24;
        }else{
          mon.x += mon.vx * mon.dir;
          if(mon.x < 20 || mon.x > currentMap.width - 20 - mon.w) mon.dir *= -1;
        }
        if(mon.hitCd > 0) mon.hitCd--;
        const near = Math.abs((P.pos_x+P.w*.5) - (mon.x+mon.w*.5)) < 220;
        if(near) mon.dir = P.pos_x < mon.x ? -1 : 1;
        if(P.pos_x + P.w > mon.x && P.pos_x < mon.x + mon.w && P.pos_y + P.h > mon.y && P.pos_y < mon.y + mon.h){
          damagePlayer(mon.atk);
        }
      });
    }

    function updateRespawns(){
      const now = performance.now();
      const keep = [];
      for(const r of GS.respawnQueue){
        if(r.at > now || r.mapId !== P.map_id){ keep.push(r); continue; }
        monsters.push(createMonster(r.kind, r.x, r.y));
        pushChatMessage('SYSTEM', `${r.kind.toUpperCase()} が再出現した。`, 'system');
      }
      GS.respawnQueue = keep;
    }

    function updateWorldDrops(){
      for(const d of GS.worldDrops){
        d.vy += .24;
        d.x += d.vx;
        d.y += d.vy;
        if(d.y > currentMap.ground - 20){ d.y = currentMap.ground - 20; d.vy *= -0.2; d.vx *= .86; }
        d.life--;
        if(P.pos_x + P.w > d.x - 12 && P.pos_x < d.x + 12 && P.pos_y + P.h > d.y - 18 && P.pos_y < d.y + 18){
          addItemToInventory(d.itemId, d.qty || 1);
          advanceQuestObjective('collectItem', d.itemId, d.qty || 1);
          refreshAllQuestProgress();
          spawnHitText(d.x, d.y - 6, `GET ${ITEM_DATA[d.itemId]?.name || d.itemId}`, '#64df96');
          pushChatMessage('SYSTEM', `${ITEM_DATA[d.itemId]?.name || d.itemId} を拾った。`, 'system');
          d.life = 0;
        }
      }
      GS.worldDrops = GS.worldDrops.filter(d=>d.life > 0);
    }

    function updateHitTexts(){
      GS.hitTexts.forEach(h=>{ h.y -= .5; h.life--; });
      GS.hitTexts = GS.hitTexts.filter(h=>h.life > 0);
    }

    function updatePassiveState(ts){
      updateSkillFx();
      updateHitTexts();
      if(GS.npcDialogue && performance.now() > GS.npcDialogue.until) GS.npcDialogue = null;
      const npc = GS.scene === 'play' ? getNearbyNpc() : null;
      if(npc){
        GS.interactionText = `[E] ${npc.name} と会話`;
        GS.interactionUntil = performance.now() + 120;
      }
      if(ts - GS.lastChatPoll > 4000 && GS.scene === 'play'){
        GS.lastChatPoll = ts;
        fetchRecentChat();
      }
    }
    function updateAutosave(ts){
      updateRespawns();
      if(ts - GS.lastSave > 15000 && GS.scene === 'play'){
        GS.lastSave = ts;
        savePlayer();
        savePresence();
        loadOthers();
        ensureChatSubscription();
        ensurePresenceSubscription();
      }
    }

    function drawRect(x,y,w,h,c){ CTX.fillStyle=c; CTX.fillRect(Math.round(x),Math.round(y),Math.round(w),Math.round(h)); }
    function drawText(t,x,y,c='#fff',font='12px monospace',align='left'){
      CTX.save();
      CTX.fillStyle = c;
      CTX.font = font;
      CTX.textAlign = align;
      CTX.shadowColor = 'rgba(0,0,0,.38)';
      CTX.shadowBlur = 6;
      CTX.fillText(t,x,y);
      CTX.restore();
    }

    function drawSky(){
      const skyImg = getConfiguredAsset('backgrounds', 'sky');
      if(!drawImageFit(skyImg, 0, 0, CVS.width, CVS.height)){
        const g = CTX.createLinearGradient(0,0,0,CVS.height);
        g.addColorStop(0,currentMap.bg2);
        g.addColorStop(.55,'rgba(130,190,255,.72)');
        g.addColorStop(1,currentMap.bg1);
        CTX.fillStyle=g; CTX.fillRect(0,0,CVS.width,CVS.height);
      }
      const haze = CTX.createLinearGradient(0,0,0,CVS.height);
      haze.addColorStop(0,'rgba(255,255,255,.10)');
      haze.addColorStop(.45,'rgba(255,255,255,.03)');
      haze.addColorStop(1,'rgba(0,0,0,0)');
      CTX.fillStyle = haze;
      CTX.fillRect(0,0,CVS.width,CVS.height);
      for(let i=0;i<9;i++){
        const px = ((i*190 - GS.camX*0.3) % (CVS.width+260)) - 140;
        CTX.fillStyle='rgba(255,255,255,.12)';
        CTX.beginPath(); CTX.ellipse(px, 110 + (i%4)*26, 84, 28, 0, 0, Math.PI*2); CTX.fill();
      }
    }
    function drawParallax(){
      const farImg = getConfiguredAsset('backgrounds', 'parallaxFar');
      const midImg = getConfiguredAsset('backgrounds', 'parallaxMid');
      if(farImg){
        const px = -((GS.camX * 0.18) % CVS.width);
        drawImageFit(farImg, px, 180, CVS.width, 420);
        drawImageFit(farImg, px + CVS.width, 180, CVS.width, 420);
      }
      if(midImg){
        const px = -((GS.camX * 0.35) % CVS.width);
        drawImageFit(midImg, px, 230, CVS.width, 380);
        drawImageFit(midImg, px + CVS.width, 230, CVS.width, 380);
      }
      if(!farImg && !midImg){
        for(let i=0;i<6;i++){
          const x = ((i*320 - GS.camX*0.52) % (CVS.width+420)) - 140;
          CTX.fillStyle='rgba(18,28,54,.34)';
          CTX.beginPath(); CTX.moveTo(x,560); CTX.lineTo(x+140,300); CTX.lineTo(x+320,560); CTX.closePath(); CTX.fill();
          CTX.fillStyle='rgba(10,18,36,.24)';
          CTX.beginPath(); CTX.moveTo(x+70,560); CTX.lineTo(x+190,340); CTX.lineTo(x+360,560); CTX.closePath(); CTX.fill();
        }
      }
    }
    function drawPlatformVisual(x, y, w, h){
      const img = getConfiguredAsset('world', 'platform');
      if(drawImageFit(img, x, y, w, h)) return;
      drawRect(x,y,w,h,'#3b2f21');
      drawRect(x,y,w,6,'#8b6b44');
    }
    function drawPlatforms(){
      currentMap.platforms.forEach(p=>{
        const x = p.x - GS.camX;
        drawPlatformVisual(x,p.y,p.w,p.h);
      });
    }
    function drawPortalVisual(x, y, w, h){
      const img = getConfiguredAsset('world', 'portal');
      if(drawImageFit(img, x, y, w, h)) return;
      drawRect(x,y,w,h,'rgba(103,232,249,.22)');
      CTX.strokeStyle='rgba(103,232,249,.7)'; CTX.strokeRect(x,y,w,h);
    }
    function drawPortals(){
      currentMap.portals.forEach(po=>{
        const x = po.x - GS.camX;
        drawPortalVisual(x,po.y,po.w,po.h);
        drawText(po.label, x + po.w/2, po.y - 8, '#67e8f9', '11px monospace', 'center');
      });
    }
    function drawDropVisual(itemId, x, y, size=18){
      const itemImg = getConfiguredAsset('items', getItemAssetKey(itemId)) || getConfiguredAsset('world', 'dropDefault');
      if(drawImageFit(itemImg, x - size/2, y - size/2, size, size)) return;
      drawRect(x-9,y-9,18,18,'#ffcf4d');
    }
    function drawWorldDrops(){
      GS.worldDrops.forEach(d=>{
        const x = d.x - GS.camX;
        const item = ITEM_DATA[d.itemId];
        drawDropVisual(d.itemId, x, d.y, 20);
        drawText(item?item.name:'ITEM', x, d.y - 14, '#fff', '10px monospace', 'center');
      });
    }
    function drawNpcVisual(npc, x, y){
      drawRect(x, y, npc.w, npc.h, npc.color || '#8be9fd');
      drawRect(x + 4, y + 8, npc.w - 8, npc.h - 12, 'rgba(255,255,255,.18)');
      drawText(npc.title || 'NPC', x + npc.w * 0.5, y - 12, '#fff1a6', '11px monospace', 'center');
      drawText(npc.name || 'NPC', x + npc.w * 0.5, y - 26, '#ffffff', 'bold 12px monospace', 'center');
    }
    function drawNpcs(){
      const nearby = getNearbyNpc();
      getCurrentMapNpcs().forEach(npc=>{
        const x = npc.x - GS.camX;
        drawNpcVisual(npc, x, npc.y - npc.h);
        if(nearby && nearby.id === npc.id){
          drawText('[E]', x + npc.w * 0.5, npc.y - npc.h - 42, '#67e8f9', 'bold 12px monospace', 'center');
        }
      });
    }
    function drawMonsterVisual(mon, x, y){
      const img = getConfiguredAsset('monsters', getMonsterAssetKey(mon.kind));
      if(drawImageFit(img, x, y, mon.w, mon.h, { alpha: mon.hitCd>0 ? .72 : 1, flipX: mon.dir < 0 })) return;
      CTX.globalAlpha = mon.hitCd>0 ? .55 : 1;
      drawRect(x, y, mon.w, mon.h, mon.color);
      CTX.globalAlpha = 1;
    }
    function drawMonsters(){
      monsters.forEach(mon=>{
        const x = mon.x - GS.camX;
        drawMonsterVisual(mon, x, mon.y);
        drawRect(x, mon.y - 8, mon.w, 4, 'rgba(0,0,0,.45)');
        drawRect(x, mon.y - 8, mon.w * (mon.hp / mon.maxHp), 4, '#ff6b78');
        drawText(mon.kind.toUpperCase(), x + mon.w/2, mon.y - 12, '#fff', '10px monospace', 'center');
      });
    }
    function drawRemotePlayerVisual(o, x, y, w=30, h=50){
      const img = getConfiguredAsset('others', getOtherPlayerAssetKey());
      if(drawImageFit(img, x, y, w, h, { flipX: (o.facing || 1) < 0 })) return;
      drawRect(x,y,w,h,'rgba(100,160,255,.65)');
    }
    function drawOthers(){
      GS.others.forEach(o=>{
        const x = o.pos_x - GS.camX;
        drawRemotePlayerVisual(o, x, o.pos_y, 30, 50);
        drawText(o.player_name || 'Player', x+15, o.pos_y - 8, '#9fd0ff', '11px monospace', 'center');
      });
    }
    function drawPlayerVisual(x, y, w, h){
      const img = getConfiguredAsset('player', getPlayerAssetKey());
      const alpha = P.invuln>0 && Math.floor(P.invuln/4)%2===0 ? .45 : 1;
      if(drawImageFit(img, x, y, w, h, { alpha, flipX: P.facing < 0 })) return;
      CTX.globalAlpha = alpha;
      drawRect(x, y, w, h, P.attackFlash>0 ? '#ffe699' : '#f3f5fb');
      CTX.globalAlpha = 1;
    }
    function drawPlayer(){
      const x = P.pos_x - GS.camX;
      drawPlayerVisual(x, P.pos_y, P.w, P.h);
      drawText(P.name || 'NO NAME', x + P.w/2, P.pos_y - 12, '#ffcf4d', '12px monospace', 'center');
      if(P.attackFlash>0){
        const ax = P.facing>0 ? x + P.w : x - 26;
        drawRect(ax, P.pos_y + 12, 26, 12, 'rgba(255,255,255,.85)');
      }
    }
    function drawHitTexts(){
      GS.hitTexts.forEach(h=> drawText(h.text, h.x - GS.camX, h.y, h.color, 'bold 12px monospace', 'center'));
    }
    function drawBar(x,y,w,h,ratio,fill,bg='rgba(0,0,0,.42)',stroke='rgba(255,255,255,.12)'){
      drawRect(x,y,w,h,bg);
      const inner = Math.max(0, Math.min(1, ratio || 0));
      if(inner > 0){
        const g = CTX.createLinearGradient(x,y,x+w,y);
        g.addColorStop(0, fill);
        g.addColorStop(1, 'rgba(255,255,255,.28)');
        drawRect(x,y,w*inner,h,g);
      }
      CTX.strokeStyle = stroke;
      CTX.strokeRect(x,y,w,h);
    }
    function drawQuestTracker(){
      const tracked = getTrackedQuestData();
      if(!tracked) return;
      const { def } = tracked;
      const state = ensureQuestState(tracked.id);
      drawRect(18,144,420,136,'rgba(10,13,24,.68)');
      CTX.strokeStyle='rgba(255,255,255,.12)'; CTX.strokeRect(18,144,420,136);
      drawText(`QUEST: ${def.title}`, 34, 168, '#9ef7ff', 'bold 14px monospace');
      drawText(def.summary || '', 34, 188, '#d7dced', '11px monospace');
      def.objectives.forEach((obj, idx)=>{
        const now = getQuestProgressValue(tracked.id, obj);
        const done = now >= (obj.need || 1);
        drawText(`${done ? '✔' : '•'} ${obj.label}`, 34, 214 + idx * 20, done ? '#9be7b5' : '#ffffff', '12px monospace');
        drawText(`${Math.min(now, obj.need || 1)} / ${obj.need || 1}`, 404, 214 + idx * 20, done ? '#9be7b5' : '#ffd580', '12px monospace', 'right');
      });
      if(state.completed){
        drawText('COMPLETE', 404, 168, '#64df96', 'bold 12px monospace', 'right');
      }
    }
    function drawInteractionHud(){
      if(GS.interactionText && performance.now() < GS.interactionUntil){
        drawRect(476, 626, 328, 26, 'rgba(10,13,24,.78)');
        CTX.strokeStyle='rgba(103,232,249,.24)'; CTX.strokeRect(476, 626, 328, 26);
        drawText(GS.interactionText, 640, 644, '#67e8f9', '12px monospace', 'center');
      }
      if(GS.questToast && performance.now() < GS.questToastUntil){
        drawRect(440, 40, 400, 28, 'rgba(24,38,70,.92)');
        CTX.strokeStyle='rgba(255,207,77,.35)'; CTX.strokeRect(440, 40, 400, 28);
        drawText(GS.questToast, 640, 58, '#ffcf4d', '12px monospace', 'center');
      }
      if(GS.npcDialogue && performance.now() < GS.npcDialogue.until){
        drawRect(260, 534, 760, 92, 'rgba(8,10,18,.92)');
        CTX.strokeStyle='rgba(255,255,255,.14)'; CTX.strokeRect(260, 534, 760, 92);
        drawText(`${GS.npcDialogue.speaker} / ${GS.npcDialogue.title || 'NPC'}`, 280, 560, '#ffd580', 'bold 14px monospace');
        drawText(GS.npcDialogue.text, 280, 590, '#ffffff', '12px monospace');
      }
    }
    function drawHUD(){
      drawRect(18,18,330,112,'rgba(10,13,24,.68)');
      CTX.strokeStyle='rgba(255,255,255,.12)'; CTX.strokeRect(18,18,330,112);
      drawText(`${P.name || 'Guest'}  Lv.${P.level}  ${P.job}`, 32, 42, '#ffcf4d', 'bold 18px monospace');
      drawText(currentMap.name, 32, 68, '#9ec9ff', '14px monospace');
      drawText(`MESO ${P.meso} / CRY ${P.crystals}`, 32, 94, '#d7dced', '14px monospace');
      drawBar(392,24,320,16,P.hp/getTotalMaxHp(),'#ff6b78');
      drawText(`HP ${Math.floor(P.hp)} / ${getTotalMaxHp()}`, 552, 38, '#fff', '12px monospace', 'center');
      drawBar(392,54,320,16,P.mp/Math.max(1,getTotalMaxMp()),'#5da1ff');
      drawText(`MP ${Math.floor(P.mp)} / ${getTotalMaxMp()}`, 552, 68, '#fff', '12px monospace', 'center');
      drawBar(392,84,320,14,P.exp/expToNext(P.level),'#64df96');
      drawText(`EXP ${P.exp} / ${expToNext(P.level)}`, 552, 96, '#0b1410', '11px monospace', 'center');
      drawRect(908,18,350,124,'rgba(10,13,24,.68)');
      CTX.strokeStyle='rgba(255,255,255,.12)'; CTX.strokeRect(908,18,350,124);
      drawText('操作 / スキル', 924, 42, '#67e8f9', 'bold 14px monospace');
      drawText('移動:A/D or ←→  ジャンプ:W/↑/Space', 924, 68, '#fff', '12px monospace');
      drawText('攻撃:J  会話:E  クエスト切替:Q  インベントリ:I', 924, 90, '#fff', '12px monospace');
      const skills = getActiveSkills();
      drawText(`1:${skills[0]?.name||'-'}  2:${skills[1]?.name||'-'}  3:${skills[2]?.name||'-'}`, 924, 112, '#fff', '12px monospace');
      const cds = skills.map(s=> s ? `${s.key}:${skillCooldownLeft(s) || 'OK'}` : '').join('  ');
      drawText(cds, 924, 132, '#d9def2', '11px monospace');
      if(GS.saveStateText && performance.now() < GS.saveStateUntil){
        drawText(GS.saveStateText, 924, 152, GS.saveStateOk ? '#64df96' : '#ff9aa4', '11px monospace');
      }
      if(GS.noticeText && performance.now() < GS.noticeUntil){
        drawRect(320, 672, 640, 28, GS.noticeOk ? 'rgba(28,90,54,.88)' : 'rgba(110,44,56,.88)');
        CTX.strokeStyle = GS.noticeOk ? 'rgba(100,223,150,.55)' : 'rgba(255,107,120,.55)';
        CTX.strokeRect(320, 672, 640, 28);
        drawText(GS.noticeText, 640, 691, '#fff', '13px monospace', 'center');
      }
      drawQuestTracker();
      drawInteractionHud();
    }
    function drawMapScene(){
      const sx = GS.camShake ? rand(-GS.camShake, GS.camShake) : 0;
      const sy = GS.camShake ? rand(-GS.camShake * 0.5, GS.camShake * 0.5) : 0;
      CTX.save();
      CTX.translate(sx, sy);
      drawSky();
      drawParallax();
      drawPlatforms();
      drawPortals();
      drawWorldDrops();
      drawNpcs();
      drawOthers();
      drawMonsters();
      drawSkillFx();
      drawPlayer();
      drawHitTexts();
      CTX.restore();
      drawHUD();
    }
    function drawLoginScene(){
      const g = CTX.createLinearGradient(0,0,0,CVS.height);
      g.addColorStop(0,'#0f1530'); g.addColorStop(1,'#06070d');
      CTX.fillStyle=g; CTX.fillRect(0,0,CVS.width,CVS.height);
      drawText('ALTERA MMO', CVS.width/2, 220, '#ffcf4d', 'bold 40px monospace', 'center');
      drawText('ログインUIを表示中...', CVS.width/2, 260, '#dfe6f8', '14px monospace', 'center');
    }
    function drawCreateScene(){
      drawLoginScene();
      drawText('キャラクター作成', CVS.width/2, 300, '#67e8f9', 'bold 18px monospace', 'center');
    }

    function gameLoop(ts){
      GS.ts = ts;
      CTX.clearRect(0,0,CVS.width,CVS.height);
      if(isFormInteractionMode()) clearGameplayInputs();
      if(GS.scene === 'play' && currentMap){
        updatePassiveState(ts);
        if(!GS.inventoryOpen){
          updatePlayer();
          updateMonsters();
          updateWorldDrops();
          updateAutosave(ts);
        }
        drawMapScene();
      }else if(GS.scene === 'create'){
        drawCreateScene();
      }else{
        drawLoginScene();
      }
      requestAnimationFrame(gameLoop);
    }

    function resizeCanvas(){
      const ratio = VIEW_W / VIEW_H;
      let w = window.innerWidth, h = window.innerHeight;
      if(w/h > ratio) w = h * ratio; else h = w / ratio;
      CVS.style.width = Math.floor(w) + 'px';
      CVS.style.height = Math.floor(h) + 'px';
    }

    window.addEventListener('keydown', e=>{
      if(e.code === 'Escape' && GS.inventoryOpen){ e.preventDefault(); hideInventoryUI(); return; }
      if(e.code === 'Enter' && !e.isComposing && isTypingTarget(e.target)){
        if(e.target === qs('chatInput')){ e.preventDefault(); return sendChat(); }
        if(GS.scene === 'login'){ e.preventDefault(); return GS.activeAuthTab === 'register' ? doRegister() : doLogin(); }
        if(GS.scene === 'create'){ e.preventDefault(); return finalizeCharacterCreate(); }
      }
      if(isTypingTarget(e.target) || isFormInteractionMode()) return;
      if(GS.inventoryOpen){
        if(e.code === 'ArrowUp'){ e.preventDefault(); GS.selectedInvIndex = clamp(GS.selectedInvIndex - 1, 0, Math.max(0, P.inventory.length - 1)); renderInventoryUI(); return; }
        if(e.code === 'ArrowDown'){ e.preventDefault(); GS.selectedInvIndex = clamp(GS.selectedInvIndex + 1, 0, Math.max(0, P.inventory.length - 1)); renderInventoryUI(); return; }
        if(e.code === 'Enter'){ e.preventDefault(); const entry = P.inventory[GS.selectedInvIndex]; const item = entry && ITEM_DATA[entry.itemId]; if(item){ const slot = slotForType(item.type); if(slot) equipItemByIndex(GS.selectedInvIndex); else if(item.type === 'consumable') useItemByIndex(GS.selectedInvIndex); } return; }
      }
      GS.keys[e.code] = true;
      if(GS.scene !== 'play') return;
      if(e.code === 'KeyT'){ e.preventDefault(); focusLater('chatInput'); return; }
      if(e.code === 'Digit1'){ e.preventDefault(); useSkillSlot(0); return; }
      if(e.code === 'Digit2'){ e.preventDefault(); useSkillSlot(1); return; }
      if(e.code === 'Digit3'){ e.preventDefault(); useSkillSlot(2); return; }
      if(e.code === 'KeyJ'){ e.preventDefault(); basicAttack(); }
      if(e.code === 'KeyI'){ e.preventDefault(); toggleInventoryUI(); }
      if(e.code === 'KeyE'){ e.preventDefault(); interactNearestNpc(); }
      if(e.code === 'KeyQ'){
        e.preventDefault();
        const active = QUEST_ORDER.filter(id=>{ const q = ensureQuestState(id); return q.started && !q.completed; });
        if(active.length){
          const idx = Math.max(0, active.indexOf(getTrackedQuestId()));
          GS.selectedQuestId = active[(idx + 1) % active.length];
          GS.questToast = `追跡クエスト: ${QUEST_DEFS[GS.selectedQuestId].title}`;
          GS.questToastUntil = performance.now() + 1800;
        }
      }
    });
    window.addEventListener('keyup', e=>{ if(isTypingTarget(e.target) || isFormInteractionMode()) return; GS.keys[e.code] = false; if(e.code==='Space') GS.mobile.jump=false; });

    qs('tabLogin').onclick = ()=> switchAuthTab('login');
    qs('tabRegister').onclick = ()=> switchAuthTab('register');
    qs('loginAction').onclick = doLogin;
    qs('quickContinueBtn').onclick = quickContinueFromLocal;
    qs('chatSendBtn').onclick = sendChat;
    qs('createStartBtn').onclick = finalizeCharacterCreate;
    qs('btnCloseInv').onclick = hideInventoryUI;
    qs('btnEquip').onclick = ()=> equipItemByIndex(GS.selectedInvIndex);
    qs('btnUse').onclick = ()=> useItemByIndex(GS.selectedInvIndex);
    qs('btnDiscard').onclick = ()=> dropItemByIndex(GS.selectedInvIndex);
    qs('btnUnequip').onclick = ()=>{
      if(GS.selectedEquipSlot && P.equipped[GS.selectedEquipSlot]) return unequipSlot(GS.selectedEquipSlot);
      const slots=['weapon','head','body','accessory'];
      for(const s of slots){ if(P.equipped[s]) return unequipSlot(s); }
      liMsg('外せる装備がありません。');
    };

    (function initJoy(){
      const pad = qs('mobilePad'); const stick = qs('joyStick');
      let active = false, pid = null;
      function update(clientX, clientY){
        const r = pad.getBoundingClientRect();
        const cx = r.left + r.width/2, cy = r.top + r.height/2;
        let dx = clientX - cx, dy = clientY - cy;
        const dist = Math.hypot(dx,dy), max = 34;
        if(dist > max){ dx = dx / dist * max; dy = dy / dist * max; }
        stick.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
        GS.mobile.left = dx < -10; GS.mobile.right = dx > 10;
      }
      pad.addEventListener('pointerdown', e=>{ active=true; pid=e.pointerId; pad.setPointerCapture(pid); update(e.clientX,e.clientY); });
      pad.addEventListener('pointermove', e=>{ if(active && e.pointerId===pid) update(e.clientX,e.clientY); });
      function end(e){ if(e.pointerId!==pid) return; active=false; pid=null; GS.mobile.left=false; GS.mobile.right=false; stick.style.transform='translate(-50%,-50%)'; }
      pad.addEventListener('pointerup', end); pad.addEventListener('pointercancel', end);
    })();

    qs('btnJumpMobile').addEventListener('pointerdown', e=>{ e.preventDefault(); GS.mobile.jump = true; setTimeout(()=>GS.mobile.jump=false,120); });
    qs('btnAtkMobile').addEventListener('pointerdown', e=>{ e.preventDefault(); basicAttack(); });
    qs('btnBagMobile').addEventListener('pointerdown', e=>{ e.preventDefault(); toggleInventoryUI(); });
    qs('btnSkill1Mobile').addEventListener('pointerdown', e=>{ e.preventDefault(); useSkillSlot(0); });
    qs('btnSkill2Mobile').addEventListener('pointerdown', e=>{ e.preventDefault(); useSkillSlot(1); });
    qs('btnSkill3Mobile').addEventListener('pointerdown', e=>{ e.preventDefault(); useSkillSlot(2); });

    function cleanupOnlineSession(){
      savePlayerToLocal();
      clearPresence();
      if(sb && GS.chatChannel){
        sb.removeChannel(GS.chatChannel);
        GS.chatChannel = null;
      }
      if(sb && GS.presenceChannel){
        sb.removeChannel(GS.presenceChannel);
        GS.presenceChannel = null;
      }
      GS.chatOnline = false;
      GS.presenceOnline = false;
      setOnlineError('');
    }
    window.addEventListener('beforeunload', cleanupOnlineSession);
    window.addEventListener('pagehide', cleanupOnlineSession);
    window.addEventListener('resize', resizeCanvas);
    window.addEventListener('blur', clearGameplayInputs);
    window.addEventListener('focusin', e=>{ if(isTypingTarget(e.target)) clearGameplayInputs(); });
    document.addEventListener('visibilitychange', ()=>{ if(document.hidden) clearGameplayInputs(); });

    async function boot(){
      applyRenderQuality();
      loadAdminVisualConfig();
      resizeCanvas();
      initMobileUI();
      loadChatLocal();
      updateOnlineUiState();
      switchAuthTab('login');
      try{
        await initSB();
        const masterResult = await loadMasterDataFromDB();
        if(!masterResult?.ok) throw new Error(masterResult?.reason || 'master load failed');
        setSaveStatus(`マスターデータ読込: Supabase (${masterResult.stats.items} items / ${masterResult.stats.maps} maps)`, true, 2600);
        initProgressionScaffold();
        loadPlayerFromLocal();
        updateLocalSavePreview();
        updateGameplayPanels();
        if(P.login_id) qs('loginId').value = P.login_id;
        if(P.login_id && P.password_hash && !P.name){
          showCreateUI();
        }else{
          showLoginUI();
        }
        setMasterDataRequiredMessage('');
      }catch(err){
        GS.masterDataSource = 'required-db';
        GS.masterDataLoaded = false;
        GS.masterDataError = String(err?.message || err || 'master load failed');
        console.warn('strict master load failed', err);
        setOnlineError(GS.masterDataError);
        setSaveStatus('DBマスターデータ必須 / ゲーム開始停止中', false, 0);
        updateLocalSavePreview();
        updateGameplayPanels();
        showLoginUI();
        setMasterDataRequiredMessage(`DBマスターデータ必須: ${GS.masterDataError}`);
      }
      requestAnimationFrame(gameLoop);
    }

    boot();
  </script>
</body>
</html>

<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>ALTERA MMO MVP Complete</title>
  <style>
    :root{
      --bg:#06070d;--bg2:#101427;--panel:rgba(11,14,26,.96);--line:#252b4c;--txt:#d8ddf0;--muted:#8990ab;
      --blue:#5da1ff;--gold:#ffcf4d;--green:#64df96;--red:#ff6b78;--cyan:#67e8f9;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:#000;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;color:var(--txt);touch-action:none;-webkit-user-select:none;user-select:none}
    body{display:flex;align-items:center;justify-content:center}
    #gameCanvas{display:block;background:#0a0d16;max-width:100vw;max-height:100vh;image-rendering:pixelated;box-shadow:0 0 40px rgba(0,0,0,.45)}
    #rotateMsg{display:none;position:fixed;inset:0;z-index:3000;background:#000;align-items:center;justify-content:center;flex-direction:column;gap:10px;color:var(--gold);font-size:22px;text-align:center}
    @media (orientation: portrait){#rotateMsg{display:flex}}
    .overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(5,7,13,.82);backdrop-filter:blur(6px);z-index:2000}
    .hidden{display:none !important}
    .card{width:min(420px,calc(100vw - 26px));background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,.45)}
    .logo{font-size:32px;font-weight:800;letter-spacing:4px;text-align:center;color:var(--gold)}
    .sub{font-size:11px;color:var(--muted);text-align:center;margin:4px 0 18px}
    .tabs{display:flex;gap:8px;margin-bottom:14px}
    .tab{flex:1;border:1px solid var(--line);background:#171d33;color:var(--txt);padding:10px 12px;border-radius:10px;cursor:pointer}
    .tab.active{background:linear-gradient(180deg,#2b5fbc,#214a94);border-color:#3e78db}
    .field{margin-bottom:12px}
    .label{font-size:11px;color:var(--muted);margin-bottom:6px}
    .input,.select{width:100%;padding:12px;border-radius:10px;border:1px solid var(--line);background:#0f1324;color:var(--txt);outline:none}
    .input:focus,.select:focus{border-color:#4278db;box-shadow:0 0 0 2px rgba(66,120,219,.2)}
    .msg{min-height:18px;font-size:11px;color:var(--red);margin:6px 0 2px}
    .ok{color:var(--green)}
    .btnRow{display:flex;gap:10px;margin-top:10px}
    .btn{flex:1;padding:12px;border-radius:10px;border:1px solid var(--line);background:#18203a;color:var(--txt);font-weight:700;cursor:pointer}
    .btn.primary{background:linear-gradient(180deg,#6aaeff,#4d87ea);color:#08111d;border-color:#67a0f5}
    .btn.gold{background:linear-gradient(180deg,#ffd76b,#e2a92f);color:#1a1203;border-color:#efc551}
    .btn:disabled{opacity:.5;cursor:not-allowed}
    .note{font-size:10px;color:var(--muted);line-height:1.55;margin-top:10px}

    #mobilePad,#mobileButtons{position:fixed;z-index:1500}
    #mobilePad{left:18px;bottom:18px;width:128px;height:128px;border-radius:50%;background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.15);display:none}
    #mobilePad.show{display:block}
    #joyStick{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:54px;height:54px;border-radius:50%;background:rgba(255,255,255,.28);pointer-events:none}
    #mobileButtons{right:18px;bottom:18px;display:none;gap:12px;align-items:flex-end}
    #mobileButtons.show{display:flex}
    .mBtn{width:70px;height:70px;border-radius:50%;border:2px solid rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700;background:rgba(255,255,255,.08);backdrop-filter:blur(3px)}
    .mBtn.attack{background:rgba(255,90,110,.23);border-color:rgba(255,90,110,.45)}
    .mBtn.jump{background:rgba(90,140,255,.23);border-color:rgba(90,140,255,.45);margin-bottom:70px}
    .mBtn.bag{background:rgba(255,207,77,.18);border-color:rgba(255,207,77,.42)}

    #inventoryOverlay .card{width:min(780px,calc(100vw - 24px))}
    .invGrid{display:grid;grid-template-columns:240px 1fr;gap:16px}
    .panelTitle{font-size:13px;color:var(--gold);margin-bottom:10px}
    .slot{display:flex;justify-content:space-between;align-items:center;padding:10px;border-radius:10px;border:1px solid var(--line);background:#101525;margin-bottom:8px;font-size:12px}
    .items{max-height:420px;overflow:auto;border:1px solid var(--line);border-radius:12px;background:#0d1221;padding:8px}
    .item{padding:10px;border-radius:10px;border:1px solid transparent;cursor:pointer;font-size:12px;display:flex;justify-content:space-between;gap:8px}
    .item:hover{background:#131b31}
    .item.selected{background:#14213e;border-color:#3968c3}
    .detail{border:1px solid var(--line);border-radius:12px;background:#101525;padding:12px;min-height:170px;font-size:12px;line-height:1.6}
    .muted{color:var(--muted)}
  </style>
</head>
<body>
  <div id="rotateMsg"><div style="font-size:56px">📱↩</div><div>横向きにしてください</div></div>
  <canvas id="gameCanvas" width="960" height="540"></canvas>

  <div id="loginOverlay" class="overlay hidden">
    <div class="card">
      <div class="logo">ALTERA</div>
      <div class="sub">2D SIDE-SCROLL MMO MVP COMPLETE</div>
      <div class="tabs">
        <button id="tabLogin" class="tab active">ログイン</button>
        <button id="tabRegister" class="tab">新規登録</button>
      </div>
      <div class="field">
        <div class="label">ログインID</div>
        <input id="loginId" class="input" placeholder="3〜20文字 / 英数と_" maxlength="20">
      </div>
      <div class="field">
        <div class="label">パスワード</div>
        <input id="loginPw" class="input" type="password" placeholder="6文字以上" maxlength="64">
      </div>
      <div id="loginMsg" class="msg"></div>
      <div class="btnRow">
        <button id="loginAction" class="btn primary">ログイン</button>
      </div>
      <div class="note">初回は新規登録 → キャラクター名を決定 → ゲーム開始。<br>保存はローカル + Supabase に行います。</div>
    </div>
  </div>

  <div id="createOverlay" class="overlay hidden">
    <div class="card">
      <div class="logo">CHARACTER CREATE</div>
      <div class="sub">最初のキャラクターを作成</div>
      <div class="field">
        <div class="label">キャラクター名</div>
        <input id="charName" class="input" placeholder="2〜12文字" maxlength="12">
      </div>
      <div class="field">
        <div class="label">職業</div>
        <select id="charJob" class="select">
          <option value="Novice">Novice</option>
          <option value="Warrior">Warrior</option>
          <option value="Archer">Archer</option>
          <option value="Mage">Mage</option>
        </select>
      </div>
      <div id="createMsg" class="msg"></div>
      <div class="btnRow">
        <button id="createStartBtn" class="btn gold">この名前で始める</button>
      </div>
      <div class="note">職業はMVP用の初期値です。後で分岐拡張できます。</div>
    </div>
  </div>

  <div id="inventoryOverlay" class="overlay hidden">
    <div class="card">
      <div class="logo" style="font-size:24px">INVENTORY</div>
      <div class="sub">I キー / BAG ボタンで開閉</div>
      <div class="invGrid">
        <div>
          <div class="panelTitle">装備</div>
          <div id="equipSlots"></div>
          <div class="panelTitle" style="margin-top:14px">能力値</div>
          <div id="statPreview" class="detail"></div>
        </div>
        <div>
          <div class="panelTitle">所持アイテム</div>
          <div id="inventoryList" class="items"></div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px">
            <div id="itemDetail" class="detail"><span class="muted">アイテムを選択してください。</span></div>
            <div>
              <div class="btnRow" style="margin-top:0"><button id="btnUse" class="btn">使う</button><button id="btnEquip" class="btn primary">装備</button></div>
              <div class="btnRow"><button id="btnUnequip" class="btn">外す</button><button id="btnDiscard" class="btn">捨てる</button></div>
              <div class="btnRow"><button id="btnCloseInv" class="btn gold">閉じる</button></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="mobilePad"><div id="joyStick"></div></div>
  <div id="mobileButtons">
    <div id="btnBagMobile" class="mBtn bag">BAG</div>
    <div id="btnJumpMobile" class="mBtn jump">JUMP</div>
    <div id="btnAtkMobile" class="mBtn attack">ATK</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
    const SUPABASE_URL = 'YOUR_SUPABASE_URL';
    const SUPABASE_KEY = 'YOUR_SUPABASE_ANON_KEY';

    const CVS = document.getElementById('gameCanvas');
    const CTX = CVS.getContext('2d');
    let sb = null;

    const GS = {
      scene:'boot',
      mapId:'z01_m01',
      camX:0,
      keys:{},
      ts:0,
      lastSave:0,
      lastPresence:0,
      localLoaded:false,
      inventoryOpen:false,
      selectedInvIndex:0,
      hitTexts:[],
      worldDrops:[],
      others:[],
      mobile:{left:false,right:false,jump:false,attack:false},
      pendingLogin:null,
      selectedEquipSlot:null,
      noticeText:'',
      noticeOk:false,
      noticeUntil:0,
      debugMsg:''
    };

    function clearGameplayInputs(){
      GS.keys = {};
      GS.mobile.left = false;
      GS.mobile.right = false;
      GS.mobile.jump = false;
      GS.mobile.attack = false;
    }

    const JOB_PRESETS = {
      Novice:{max_hp:100,max_mp:30,atk:10,def:5},
      Warrior:{max_hp:130,max_mp:20,atk:14,def:7},
      Archer:{max_hp:95,max_mp:35,atk:13,def:4},
      Mage:{max_hp:85,max_mp:60,atk:15,def:3}
    };

    const ITEM_DATA = {
      rusty_sword:{id:'rusty_sword',name:'錆びた剣',type:'weapon',atk:4,def:0,maxHp:0,maxMp:0,desc:'初心者向けの古い剣。ATK +4'},
      novice_cap:{id:'novice_cap',name:'ノービスキャップ',type:'head',atk:0,def:2,maxHp:8,maxMp:0,desc:'布製の帽子。DEF +2 / MaxHP +8'},
      leather_vest:{id:'leather_vest',name:'レザーベスト',type:'body',atk:0,def:3,maxHp:12,maxMp:0,desc:'軽い胴防具。DEF +3 / MaxHP +12'},
      green_charm:{id:'green_charm',name:'緑晶のお守り',type:'accessory',atk:1,def:1,maxHp:5,maxMp:8,desc:'小さな護符。ATK +1 / DEF +1 / MaxMP +8'},
      red_potion:{id:'red_potion',name:'赤ポーション',type:'consumable',healHp:40,desc:'HPを40回復する。'},
      blue_potion:{id:'blue_potion',name:'青ポーション',type:'consumable',healMp:20,desc:'MPを20回復する。'}
    };

    const DROP_TABLE = {
      slime:[{itemId:'red_potion',chance:.35,min:1,max:1},{itemId:'rusty_sword',chance:.09,min:1,max:1}],
      shroom:[{itemId:'red_potion',chance:.20,min:1,max:2},{itemId:'novice_cap',chance:.10,min:1,max:1}],
      bat:[{itemId:'blue_potion',chance:.24,min:1,max:1},{itemId:'green_charm',chance:.08,min:1,max:1}],
      wolf:[{itemId:'leather_vest',chance:.11,min:1,max:1},{itemId:'red_potion',chance:.28,min:1,max:2}]
    };

    const MAPS = {
      z01_m01:{
        id:'z01_m01',name:'草原の入口',bg1:'#1d2d52',bg2:'#6fb8ff',width:2200,ground:470,
        platforms:[{x:0,y:470,w:2200,h:80},{x:250,y:380,w:180,h:18},{x:620,y:330,w:160,h:18},{x:980,y:280,w:180,h:18},{x:1430,y:350,w:170,h:18}],
        portals:[{x:2110,y:408,w:50,h:62,to:'z01_m02',tx:80,ty:390,label:'→ 古木の丘'}],
        monsters:[
          {kind:'slime',x:420,y:430},{kind:'slime',x:760,y:430},{kind:'shroom',x:1260,y:430},{kind:'slime',x:1680,y:430}
        ]
      },
      z01_m02:{
        id:'z01_m02',name:'古木の丘',bg1:'#20375d',bg2:'#80d4bf',width:2400,ground:470,
        platforms:[{x:0,y:470,w:2400,h:80},{x:340,y:390,w:170,h:18},{x:820,y:335,w:220,h:18},{x:1280,y:285,w:170,h:18},{x:1780,y:360,w:210,h:18}],
        portals:[{x:20,y:408,w:50,h:62,to:'z01_m01',tx:2020,ty:390,label:'← 草原の入口'},{x:2310,y:408,w:50,h:62,to:'z01_m03',tx:90,ty:390,label:'→ 廃坑入口'}],
        monsters:[
          {kind:'shroom',x:440,y:430},{kind:'bat',x:900,y:300},{kind:'shroom',x:1350,y:430},{kind:'bat',x:1870,y:330}
        ]
      },
      z01_m03:{
        id:'z01_m03',name:'廃坑入口',bg1:'#24283a',bg2:'#6c7aa6',width:2500,ground:470,
        platforms:[{x:0,y:470,w:2500,h:80},{x:300,y:395,w:160,h:18},{x:700,y:345,w:180,h:18},{x:1130,y:310,w:200,h:18},{x:1660,y:365,w:190,h:18},{x:2070,y:320,w:160,h:18}],
        portals:[{x:20,y:408,w:50,h:62,to:'z01_m02',tx:2240,ty:390,label:'← 古木の丘'}],
        monsters:[
          {kind:'wolf',x:500,y:430},{kind:'bat',x:820,y:315},{kind:'wolf',x:1500,y:430},{kind:'bat',x:2140,y:290}
        ]
      }
    };

    const MONSTER_TEMPLATE = {
      slime:{w:38,h:28,maxHp:28,atk:6,def:0,exp:8,color:'#79f29b',speed:1.0,jump:0},
      shroom:{w:34,h:34,maxHp:34,atk:7,def:1,exp:12,color:'#ff837c',speed:1.1,jump:0},
      bat:{w:34,h:22,maxHp:30,atk:8,def:1,exp:14,color:'#9d93ff',speed:1.4,jump:0,fly:true},
      wolf:{w:48,h:30,maxHp:52,atk:11,def:2,exp:22,color:'#c9d0dc',speed:1.55,jump:0}
    };

    const P = {
      id:'',login_id:'',password_hash:'',name:'',job:'Novice',
      level:1,exp:0,hp:100,max_hp:100,mp:30,max_mp:30,atk:10,def:5,meso:0,crystals:0,
      map_id:'z01_m01',pos_x:180,pos_y:390,vx:0,vy:0,w:34,h:54,facing:1,onGround:false,
      reborn_count:0,
      inventory:[{itemId:'rusty_sword',qty:1},{itemId:'red_potion',qty:3}],
      equipped:{weapon:null,head:null,body:null,accessory:null},
      attackCd:0,invuln:0,attackFlash:0
    };

    let currentMap = null;
    let monsters = [];

    function qs(id){ return document.getElementById(id); }
    function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }
    function rand(a,b){ return Math.random()*(b-a)+a; }
    function irand(a,b){ return Math.floor(rand(a,b+1)); }

    function localSaveData(){
      return {
        id:P.id,login_id:P.login_id,password_hash:P.password_hash,name:P.name,job:P.job,
        level:P.level,exp:P.exp,hp:P.hp,max_hp:P.max_hp,mp:P.mp,max_mp:P.max_mp,atk:P.atk,def:P.def,
        meso:P.meso,crystals:P.crystals,map_id:P.map_id,pos_x:P.pos_x,pos_y:P.pos_y,reborn_count:P.reborn_count,
        inventory:P.inventory,equipped:P.equipped,last_saved_at:Date.now()
      };
    }

    function safeParseJSON(raw, fallback){
      try{ return JSON.parse(raw); }catch(_){ return fallback; }
    }
    function normalizeInventory(v){
      if(!Array.isArray(v)) return [];
      return v.filter(x=>x&&x.itemId&&ITEM_DATA[x.itemId]&&Number(x.qty||0)>0).map(x=>({itemId:x.itemId,qty:Math.max(1,Math.floor(Number(x.qty)||1))}));
    }
    function normalizeEquipped(v){
      const base={weapon:null,head:null,body:null,accessory:null};
      if(!v||typeof v!=='object') return base;
      for(const k of Object.keys(base)) base[k]=v[k]&&ITEM_DATA[v[k]]?v[k]:null;
      return base;
    }

    function applyPlayerData(d){
      if(!d) return;
      P.id = d.id || P.id || crypto.randomUUID();
      P.login_id = d.login_id || P.login_id || '';
      P.password_hash = d.password_hash || P.password_hash || '';
      P.name = d.name || '';
      P.job = d.job || 'Novice';
      P.level = Math.max(1, Number(d.level||1));
      P.exp = Math.max(0, Number(d.exp||0));
      P.max_hp = Math.max(1, Number(d.max_hp||100));
      P.hp = clamp(Number(d.hp||P.max_hp), 0, P.max_hp);
      P.max_mp = Math.max(0, Number(d.max_mp||30));
      P.mp = clamp(Number(d.mp||P.max_mp), 0, P.max_mp);
      P.atk = Math.max(0, Number(d.atk||10));
      P.def = Math.max(0, Number(d.def||5));
      P.meso = Math.max(0, Number(d.meso||0));
      P.crystals = Math.max(0, Number(d.crystals||0));
      P.map_id = d.map_id || 'z01_m01';
      P.pos_x = Number(d.pos_x ?? 180);
      P.pos_y = Number(d.pos_y ?? 390);
      P.reborn_count = Math.max(0, Number(d.reborn_count||0));
      P.inventory = normalizeInventory(typeof d.inventory==='string' ? safeParseJSON(d.inventory||'[]', []) : d.inventory);
      P.equipped = normalizeEquipped(typeof d.equipped==='string' ? safeParseJSON(d.equipped||'{}', {}) : d.equipped);
      if(P.inventory.length===0) P.inventory=[{itemId:'rusty_sword',qty:1},{itemId:'red_potion',qty:3}];
      P.vx=0; P.vy=0; P.onGround=false; P.attackCd=0; P.invuln=0; P.attackFlash=0;
    }

    function savePlayerToLocal(){
      localStorage.setItem('altera_mmo_save', JSON.stringify(localSaveData()));
    }
    function loadPlayerFromLocal(){
      try{
        const raw = localStorage.getItem('altera_mmo_save');
        if(!raw) return false;
        applyPlayerData(JSON.parse(raw));
        GS.localLoaded = true;
        return true;
      }catch(e){ console.warn(e); return false; }
    }

    function expToNext(level){ return 18 + (level-1)*16; }

    function getEquippedItems(){
      return Object.values(P.equipped).filter(Boolean).map(id=>ITEM_DATA[id]).filter(Boolean);
    }
    function getEquipBonus(){
      return getEquippedItems().reduce((a,it)=>{
        a.atk += Number(it.atk||0);
        a.def += Number(it.def||0);
        a.maxHp += Number(it.maxHp||0);
        a.maxMp += Number(it.maxMp||0);
        return a;
      },{atk:0,def:0,maxHp:0,maxMp:0});
    }
    function getTotalAtk(){ return P.atk + getEquipBonus().atk; }
    function getTotalDef(){ return P.def + getEquipBonus().def; }
    function getTotalMaxHp(){ return P.max_hp + getEquipBonus().maxHp; }
    function getTotalMaxMp(){ return P.max_mp + getEquipBonus().maxMp; }

    function addItemToInventory(itemId, qty=1){
      const found = P.inventory.find(x=>x.itemId===itemId);
      if(found) found.qty += qty;
      else P.inventory.push({itemId, qty});
      savePlayerToLocal();
      renderInventoryUI();
    }
    function removeItemFromInventory(index, qty=1){
      const it = P.inventory[index];
      if(!it) return;
      it.qty -= qty;
      if(it.qty <= 0) P.inventory.splice(index,1);
      GS.selectedInvIndex = clamp(GS.selectedInvIndex, 0, Math.max(0,P.inventory.length-1));
      savePlayerToLocal();
      renderInventoryUI();
    }
    function slotForType(type){
      if(type==='weapon') return 'weapon';
      if(type==='head') return 'head';
      if(type==='body') return 'body';
      if(type==='accessory') return 'accessory';
      return null;
    }
    function equipItemByIndex(index){
      const ent = P.inventory[index]; if(!ent) return;
      const item = ITEM_DATA[ent.itemId]; if(!item) return;
      const slot = slotForType(item.type);
      if(!slot) return liMsg('このアイテムは装備できません。');
      const prev = P.equipped[slot];
      P.equipped[slot] = item.id;
      removeItemFromInventory(index,1);
      if(prev) addItemToInventory(prev,1);
      P.hp = clamp(P.hp, 0, getTotalMaxHp());
      P.mp = clamp(P.mp, 0, getTotalMaxMp());
      liMsg(item.name + ' を装備しました。', true);
      renderInventoryUI();
      savePlayer();
    }
    function unequipSlot(slot){
      const id = P.equipped[slot]; if(!id) return;
      P.equipped[slot] = null;
      addItemToInventory(id,1);
      P.hp = clamp(P.hp, 0, getTotalMaxHp());
      P.mp = clamp(P.mp, 0, getTotalMaxMp());
      renderInventoryUI();
      savePlayer();
    }
    function useItemByIndex(index){
      const ent = P.inventory[index]; if(!ent) return;
      const item = ITEM_DATA[ent.itemId]; if(!item) return;
      if(item.type !== 'consumable') return liMsg('消耗品ではありません。');
      let used = false;
      if(item.healHp){ P.hp = clamp(P.hp + item.healHp, 0, getTotalMaxHp()); used = true; }
      if(item.healMp){ P.mp = clamp(P.mp + item.healMp, 0, getTotalMaxMp()); used = true; }
      if(used){ removeItemFromInventory(index,1); liMsg(item.name + ' を使用しました。', true); savePlayer(); }
    }
    function dropItemByIndex(index){
      const ent = P.inventory[index]; if(!ent) return;
      removeItemFromInventory(index,1);
      GS.worldDrops.push({itemId:ent.itemId,qty:1,x:P.pos_x + P.facing*24,y:P.pos_y - 8,vx:P.facing*1.5,vy:-2,life:1800});
      liMsg('アイテムを捨てました。', true);
      savePlayer();
    }

    function liMsg(t, ok=false){
      const ids=['loginMsg','createMsg'];
      ids.forEach(id=>{ const el=qs(id); if(el){ el.textContent=t||''; el.className='msg'+(ok?' ok':''); } });
      GS.noticeText = t || '';
      GS.noticeOk = !!ok;
      GS.noticeUntil = performance.now() + 2400;
      setTimeout(()=>{ ids.forEach(id=>{ const el=qs(id); if(el && el.textContent===t) el.textContent=''; }); }, 2400);
    }

    async function sha256(text){
      const bytes = new TextEncoder().encode(text);
      const hash = await crypto.subtle.digest('SHA-256', bytes);
      return [...new Uint8Array(hash)].map(x=>x.toString(16).padStart(2,'0')).join('');
    }

    async function initSB(){
      if(sb) return sb;
      if(!SUPABASE_URL || !SUPABASE_KEY || SUPABASE_URL.includes('YOUR_SUPABASE_URL') || SUPABASE_KEY.includes('YOUR_SUPABASE_ANON_KEY')) {
        throw new Error('Supabase URL / KEY が未設定です');
      }
      if(!window.supabase) throw new Error('Supabase CDN を読み込めません');
      sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      return sb;
    }

    async function loadPlayerFromDB(loginId, passwordHash){
      const client = await initSB();
      const { data, error } = await client.from('mmo_players')
        .select('*')
        .eq('login_id', loginId)
        .eq('password_hash', passwordHash)
        .maybeSingle();
      if(error) throw error;
      if(!data) return null;
      applyPlayerData(data);
      savePlayerToLocal();
      return data;
    }

    async function doRegister(){
      try{
        const loginId = qs('loginId').value.trim();
        const pw = qs('loginPw').value;
        if(!/^[a-zA-Z0-9_]{3,20}$/.test(loginId)) return liMsg('IDは3〜20文字の英数または_');
        if(!pw || pw.length < 6) return liMsg('パスワードは6文字以上');
        const password_hash = await sha256(`${loginId}:${pw}`);
        const client = await initSB();
        const { data: exists, error: e1 } = await client.from('mmo_players').select('id').eq('login_id', loginId).maybeSingle();
        if(e1 && !String(e1.message||'').includes('contains 0 rows')) throw e1;
        if(exists) return liMsg('そのIDは既に使用されています。');
        GS.pendingLogin = { login_id:loginId, password_hash };
        P.id = crypto.randomUUID();
        P.login_id = loginId;
        P.password_hash = password_hash;
        P.name = '';
        P.job = 'Novice';
        const preset = JOB_PRESETS.Novice;
        P.level = 1; P.exp = 0;
        P.max_hp = preset.max_hp; P.hp = preset.max_hp;
        P.max_mp = preset.max_mp; P.mp = preset.max_mp;
        P.atk = preset.atk; P.def = preset.def;
        P.meso = 0; P.crystals = 0;
        P.map_id = 'z01_m01'; P.pos_x = 180; P.pos_y = 390;
        P.reborn_count = 0;
        P.inventory = [{itemId:'rusty_sword',qty:1},{itemId:'red_potion',qty:3}];
        P.equipped = {weapon:null,head:null,body:null,accessory:null};
        savePlayerToLocal();
        hideLoginUI();
        showCreateUI();
      }catch(err){
        console.error(err);
        liMsg('サーバーに接続できません');
      }
    }

    async function doLogin(){
      try{
        const loginId = qs('loginId').value.trim();
        const pw = qs('loginPw').value;
        if(!loginId || !pw) return liMsg('IDとパスワードを入力してください。');
        const password_hash = await sha256(`${loginId}:${pw}`);
        const data = await loadPlayerFromDB(loginId, password_hash);
        if(!data) return liMsg('IDまたはパスワードが違います。');
        const client = await initSB();
        await client.from('mmo_players').update({ last_login_at:new Date().toISOString() }).eq('id', P.id);
        hideLoginUI();
        if(!P.name) showCreateUI();
        else startGame();
      }catch(err){
        console.error(err);
        liMsg('サーバーに接続できません');
      }
    }

    async function finalizeCharacterCreate(){
      try{
        const name = qs('charName').value.trim();
        const job = qs('charJob').value || 'Novice';
        if(name.length < 2 || name.length > 12) return liMsg('名前は2〜12文字です。');
        P.name = name;
        P.job = job;
        const preset = JOB_PRESETS[job] || JOB_PRESETS.Novice;
        P.max_hp = preset.max_hp; P.hp = preset.max_hp;
        P.max_mp = preset.max_mp; P.mp = preset.max_mp;
        P.atk = preset.atk; P.def = preset.def;
        await savePlayer(true);
        hideCreateUI();
        startGame();
      }catch(err){
        console.error(err);
        liMsg('キャラクター作成に失敗しました。');
      }
    }

    async function savePlayer(force=false){
      savePlayerToLocal();
      if(!P.id || !P.login_id || !P.password_hash) return;
      try{
        const client = await initSB();
        const payload = {
          id:P.id, login_id:P.login_id, password_hash:P.password_hash,
          name:P.name||'', job:P.job||'Novice', level:P.level, exp:P.exp,
          hp:clamp(Math.round(P.hp),0,getTotalMaxHp()), max_hp:P.max_hp,
          mp:clamp(Math.round(P.mp),0,getTotalMaxMp()), max_mp:P.max_mp,
          atk:P.atk, def:P.def, meso:P.meso, crystals:P.crystals,
          map_id:P.map_id, pos_x:P.pos_x, pos_y:P.pos_y, reborn_count:P.reborn_count,
          inventory:JSON.stringify(normalizeInventory(P.inventory)),
          equipped:JSON.stringify(normalizeEquipped(P.equipped)),
          last_login_at:new Date().toISOString()
        };
        const { error } = await client.from('mmo_players').upsert(payload);
        if(error) throw error;
        if(force) await savePresence(true);
      }catch(err){
        console.warn('savePlayer failed', err);
      }
    }

    async function savePresence(force=false){
      if(!P.id || !sb) return;
      const now = performance.now();
      if(!force && now - GS.lastPresence < 1800) return;
      GS.lastPresence = now;
      try{
        await sb.from('mmo_presence').upsert({
          player_id:P.id, player_name:P.name||'', map_id:P.map_id,
          pos_x:P.pos_x, pos_y:P.pos_y, facing:P.facing, online:true
        });
      }catch(e){ }
    }
    async function clearPresence(){
      if(!P.id || !sb) return;
      try{ await sb.from('mmo_presence').upsert({player_id:P.id,player_name:P.name||'',map_id:P.map_id,pos_x:P.pos_x,pos_y:P.pos_y,facing:P.facing,online:false}); }catch(e){}
    }
    async function loadOthers(){
      if(!sb || !P.id) return;
      try{
        const { data } = await sb.from('mmo_presence').select('*').eq('map_id', P.map_id).eq('online', true);
        GS.others = (data||[]).filter(x=>x.player_id !== P.id && Date.now()-new Date(x.updated_at).getTime() < 30000);
      }catch(e){ GS.others=[]; }
    }

    function showLoginUI(){ clearGameplayInputs(); qs('loginOverlay').classList.remove('hidden'); GS.scene='login'; }
    function hideLoginUI(){ qs('loginOverlay').classList.add('hidden'); }
    function showCreateUI(){ clearGameplayInputs(); qs('createOverlay').classList.remove('hidden'); GS.scene='create'; }
    function hideCreateUI(){ qs('createOverlay').classList.add('hidden'); }
    function isTypingTarget(el){
      if(!el) return false;
      const tag = (el.tagName || '').toUpperCase();
      return tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT' || !!el.isContentEditable;
    }
    function isFormInteractionMode(){
      return isTypingTarget(document.activeElement) || GS.scene === 'login' || GS.scene === 'create';
    }
    function toggleInventoryUI(){ if(GS.scene !== 'play' || isFormInteractionMode()) return; GS.inventoryOpen ? hideInventoryUI() : showInventoryUI(); }
    function showInventoryUI(){ if(GS.scene !== 'play') return; clearGameplayInputs(); GS.inventoryOpen=true; GS.selectedEquipSlot = null; qs('inventoryOverlay').classList.remove('hidden'); renderInventoryUI(); }
    function hideInventoryUI(){ clearGameplayInputs(); GS.inventoryOpen=false; GS.selectedEquipSlot = null; qs('inventoryOverlay').classList.add('hidden'); }

    function renderInventoryUI(){
      const slots = qs('equipSlots');
      const labels = {weapon:'武器',head:'頭',body:'体',accessory:'装飾'};
      slots.innerHTML='';
      for(const slot of ['weapon','head','body','accessory']){
        const id = P.equipped[slot];
        const item = id ? ITEM_DATA[id] : null;
        const row = document.createElement('div');
        row.className='slot';
        if(GS.selectedEquipSlot === slot) row.style.borderColor = '#67a0f5';
        row.innerHTML = `<span>${labels[slot]}</span><span>${item?item.name:'- 未装備 -'}</span>`;
        row.onclick = ()=>{ GS.selectedEquipSlot = slot; renderInventoryUI(); };
        slots.appendChild(row);
      }
      const bonus = getEquipBonus();
      qs('statPreview').innerHTML = `
        JOB: <b>${P.job}</b><br>
        LV: <b>${P.level}</b><br>
        HP: <b>${Math.floor(P.hp)} / ${getTotalMaxHp()}</b><br>
        MP: <b>${Math.floor(P.mp)} / ${getTotalMaxMp()}</b><br>
        ATK: <b>${getTotalAtk()}</b> <span class="muted">(基本${P.atk} + 装備${bonus.atk})</span><br>
        DEF: <b>${getTotalDef()}</b> <span class="muted">(基本${P.def} + 装備${bonus.def})</span><br>
        MESO: <b>${P.meso}</b><br>
        CRYSTALS: <b>${P.crystals}</b>`;
      const list = qs('inventoryList');
      list.innerHTML='';
      if(P.inventory.length===0) list.innerHTML='<div class="muted" style="padding:8px">所持アイテムはありません。</div>';
      P.inventory.forEach((entry,i)=>{
        const item = ITEM_DATA[entry.itemId];
        const div = document.createElement('div');
        div.className='item'+(i===GS.selectedInvIndex?' selected':'');
        div.innerHTML = `<span>${item?item.name:entry.itemId}</span><span>x${entry.qty}</span>`;
        div.onclick = ()=>{ GS.selectedInvIndex=i; renderInventoryUI(); };
        list.appendChild(div);
      });
      const entry = P.inventory[GS.selectedInvIndex];
      const item = entry && ITEM_DATA[entry.itemId];
      qs('itemDetail').innerHTML = item ? `
        <b>${item.name}</b><br>
        種別: ${item.type}<br>
        ${item.desc||''}<br><br>
        <span class="muted">ATK ${item.atk||0} / DEF ${item.def||0} / MaxHP ${item.maxHp||0} / MaxMP ${item.maxMp||0}</span>` : '<span class="muted">アイテムを選択してください。</span>';
    }

    function createMonster(kind, x, y){
      const t = MONSTER_TEMPLATE[kind];
      return {kind,x,y,baseY:y,vx:(Math.random()<.5?-1:1)*t.speed,vy:0,w:t.w,h:t.h,maxHp:t.maxHp,hp:t.maxHp,atk:t.atk,def:t.def,exp:t.exp,color:t.color,dir:Math.random()<.5?-1:1,dead:false,hitCd:0,fly:!!t.fly};
    }

    function loadMap(id, spawnX=null, spawnY=null){
      currentMap = MAPS[id];
      if(!currentMap) currentMap = MAPS.z01_m01;
      P.map_id = currentMap.id;
      GS.mapId = currentMap.id;
      P.pos_x = spawnX ?? clamp(P.pos_x, 32, currentMap.width-32);
      P.pos_y = spawnY ?? P.pos_y;
      GS.camX = clamp(P.pos_x - CVS.width*0.5, 0, Math.max(0,currentMap.width - CVS.width));
      monsters = currentMap.monsters.map(m=>createMonster(m.kind,m.x,m.y));
      GS.worldDrops = [];
      loadOthers();
    }

    function startGame(){
      hideLoginUI();
      hideCreateUI();
      hideInventoryUI();
      loadMap(P.map_id || 'z01_m01', P.pos_x, P.pos_y);
      GS.scene='play';
      savePlayer(true);
    }

    function isMobileLike(){ return ('ontouchstart' in window) || navigator.maxTouchPoints > 0; }
    function initMobileUI(){
      const show = isMobileLike();
      qs('mobilePad').classList.toggle('show', show);
      qs('mobileButtons').classList.toggle('show', show);
    }

    function isSolidAt(x,y,w,h){
      if(!currentMap) return false;
      return currentMap.platforms.some(p=> x + w > p.x && x < p.x + p.w && y + h > p.y && y < p.y + p.h);
    }

    function resolvePlayerPlatforms(){
      P.onGround = false;
      for(const p of currentMap.platforms){
        if(P.pos_x + P.w > p.x && P.pos_x < p.x + p.w){
          const prevBottom = P.pos_y + P.h - P.vy;
          const currBottom = P.pos_y + P.h;
          if(prevBottom <= p.y + 8 && currBottom >= p.y && P.vy >= 0){
            P.pos_y = p.y - P.h;
            P.vy = 0;
            P.onGround = true;
          }
        }
      }
      if(P.pos_y + P.h >= currentMap.ground){
        P.pos_y = currentMap.ground - P.h;
        P.vy = 0;
        P.onGround = true;
      }
    }

    function spawnHitText(x,y,text,color='#fff'){ GS.hitTexts.push({x,y,text,color,life:52}); }

    function rollMonsterDrops(mon){
      const table = DROP_TABLE[mon.kind] || [];
      table.forEach(r=>{
        if(Math.random() < r.chance){
          const qty = irand(r.min||1, r.max||1);
          GS.worldDrops.push({itemId:r.itemId,qty,x:mon.x + mon.w*.5,y:mon.y,vx:rand(-1.8,1.8),vy:-2.5,life:1800});
        }
      });
      P.meso += irand(2, 8 + Math.max(1, mon.exp));
    }

    function giveExp(v){
      P.exp += v;
      while(P.exp >= expToNext(P.level)){
        P.exp -= expToNext(P.level);
        P.level += 1;
        P.max_hp += 10;
        P.max_mp += 4;
        P.atk += 2;
        P.def += 1;
        P.hp = getTotalMaxHp();
        P.mp = getTotalMaxMp();
        spawnHitText(P.pos_x + 8, P.pos_y - 18, `LEVEL UP! ${P.level}`, '#ffcf4d');
        savePlayer();
      }
    }

    function damagePlayer(monAtk){
      if(P.invuln > 0) return;
      const dmg = Math.max(1, Math.round(monAtk - getTotalDef()*0.35));
      P.hp = clamp(P.hp - dmg, 0, getTotalMaxHp());
      P.invuln = 50;
      spawnHitText(P.pos_x + P.w*.5, P.pos_y - 12, `-${dmg}`, '#ff6b78');
      if(P.hp <= 0){
        P.hp = Math.max(1, Math.floor(getTotalMaxHp() * .4));
        P.mp = Math.max(0, Math.floor(getTotalMaxMp() * .4));
        const safe = MAPS.z01_m01;
        loadMap(safe.id, 160, 390);
        savePlayer();
      }
    }

    function basicAttack(){
      if(GS.scene !== 'play' || GS.inventoryOpen || P.attackCd > 0) return;
      P.attackCd = 22;
      P.attackFlash = 5;
      const rangeW = 70;
      const hitX = P.facing > 0 ? P.pos_x + P.w : P.pos_x - rangeW;
      const hitBox = {x:hitX, y:P.pos_y + 10, w:rangeW, h:34};
      monsters.forEach(mon=>{
        if(mon.dead) return;
        if(hitBox.x + hitBox.w > mon.x && hitBox.x < mon.x + mon.w && hitBox.y + hitBox.h > mon.y && hitBox.y < mon.y + mon.h){
          const dmg = Math.max(1, Math.round(getTotalAtk() - mon.def + rand(0,5)));
          mon.hp -= dmg;
          mon.hitCd = 6;
          mon.vx += P.facing * 1.8;
          spawnHitText(mon.x + mon.w*.5, mon.y - 8, `-${dmg}`, '#fff');
          if(mon.hp <= 0){
            mon.dead = true;
            giveExp(mon.exp);
            rollMonsterDrops(mon);
            spawnHitText(mon.x + mon.w*.5, mon.y - 20, `+${mon.exp} EXP`, '#67e8f9');
            savePlayer();
          }
        }
      });
      monsters = monsters.filter(m=>!m.dead);
    }

    function tryPortal(){
      for(const po of currentMap.portals){
        if(P.pos_x + P.w > po.x && P.pos_x < po.x + po.w && P.pos_y + P.h > po.y && P.pos_y < po.y + po.h){
          loadMap(po.to, po.tx, po.ty);
          savePlayer(true);
          break;
        }
      }
    }

    function updatePlayer(){
      const left = GS.keys['ArrowLeft'] || GS.keys['KeyA'] || GS.mobile.left;
      const right = GS.keys['ArrowRight'] || GS.keys['KeyD'] || GS.mobile.right;
      const wantJump = GS.keys['ArrowUp'] || GS.keys['KeyW'] || GS.keys['Space'] || GS.mobile.jump;
      let move = 0;
      if(left) move -= 1;
      if(right) move += 1;
      if(move !== 0) P.facing = move;
      const target = move * 3.3;
      P.vx += (target - P.vx) * 0.22;
      if(Math.abs(P.vx) < .03) P.vx = 0;
      if(wantJump && P.onGround){ P.vy = -9.3; P.onGround=false; }
      P.vy += 0.42;
      P.vy = Math.min(P.vy, 11);
      P.pos_x += P.vx;
      P.pos_y += P.vy;
      P.pos_x = clamp(P.pos_x, 0, currentMap.width - P.w);
      resolvePlayerPlatforms();
      tryPortal();
      P.hp = clamp(P.hp, 0, getTotalMaxHp());
      P.mp = clamp(P.mp, 0, getTotalMaxMp());
      if(P.attackCd > 0) P.attackCd--;
      if(P.invuln > 0) P.invuln--;
      if(P.attackFlash > 0) P.attackFlash--;
      GS.camX = clamp(P.pos_x - CVS.width * .5, 0, Math.max(0,currentMap.width - CVS.width));
    }

    function updateMonsters(){
      monsters.forEach(mon=>{
        if(mon.fly){
          mon.x += mon.vx;
          if(mon.x < 40 || mon.x > currentMap.width - 40 - mon.w) mon.vx *= -1;
          mon.y = mon.baseY + Math.sin((performance.now() + mon.x)*0.004) * 24;
        }else{
          mon.x += mon.vx * mon.dir;
          if(mon.x < 20 || mon.x > currentMap.width - 20 - mon.w) mon.dir *= -1;
        }
        if(mon.hitCd > 0) mon.hitCd--;
        const near = Math.abs((P.pos_x+P.w*.5) - (mon.x+mon.w*.5)) < 220;
        if(near) mon.dir = P.pos_x < mon.x ? -1 : 1;
        if(P.pos_x + P.w > mon.x && P.pos_x < mon.x + mon.w && P.pos_y + P.h > mon.y && P.pos_y < mon.y + mon.h){
          damagePlayer(mon.atk);
        }
      });
    }

    function updateWorldDrops(){
      for(const d of GS.worldDrops){
        d.vy += .24;
        d.x += d.vx;
        d.y += d.vy;
        if(d.y > currentMap.ground - 20){ d.y = currentMap.ground - 20; d.vy *= -0.2; d.vx *= .86; }
        d.life--;
        if(P.pos_x + P.w > d.x - 12 && P.pos_x < d.x + 12 && P.pos_y + P.h > d.y - 18 && P.pos_y < d.y + 18){
          addItemToInventory(d.itemId, d.qty || 1);
          spawnHitText(d.x, d.y - 6, `GET ${ITEM_DATA[d.itemId]?.name || d.itemId}`, '#64df96');
          d.life = 0;
        }
      }
      GS.worldDrops = GS.worldDrops.filter(d=>d.life > 0);
    }

    function updateHitTexts(){
      GS.hitTexts.forEach(h=>{ h.y -= .5; h.life--; });
      GS.hitTexts = GS.hitTexts.filter(h=>h.life > 0);
    }

    function updateAutosave(ts){
      if(ts - GS.lastSave > 15000 && GS.scene === 'play'){
        GS.lastSave = ts;
        savePlayer();
        savePresence();
        loadOthers();
      }
    }

    function drawRect(x,y,w,h,c){ CTX.fillStyle=c; CTX.fillRect(Math.round(x),Math.round(y),Math.round(w),Math.round(h)); }
    function drawText(t,x,y,c='#fff',font='12px monospace',align='left'){ CTX.fillStyle=c; CTX.font=font; CTX.textAlign=align; CTX.fillText(t,x,y); }

    function drawSky(){
      const g = CTX.createLinearGradient(0,0,0,CVS.height);
      g.addColorStop(0,currentMap.bg2);
      g.addColorStop(1,currentMap.bg1);
      CTX.fillStyle=g; CTX.fillRect(0,0,CVS.width,CVS.height);
      for(let i=0;i<7;i++){
        const px = ((i*170 - GS.camX*0.3) % (CVS.width+220)) - 120;
        CTX.fillStyle='rgba(255,255,255,.12)';
        CTX.beginPath(); CTX.ellipse(px, 100 + (i%3)*24, 72, 24, 0, 0, Math.PI*2); CTX.fill();
      }
    }
    function drawParallax(){
      for(let i=0;i<5;i++){
        const x = ((i*280 - GS.camX*0.5) % (CVS.width+380)) - 120;
        CTX.fillStyle='rgba(20,30,60,.35)';
        CTX.beginPath(); CTX.moveTo(x,440); CTX.lineTo(x+120,250); CTX.lineTo(x+240,440); CTX.closePath(); CTX.fill();
      }
    }
    function drawPlatforms(){
      currentMap.platforms.forEach(p=>{
        const x = p.x - GS.camX;
        drawRect(x,p.y,p.w,p.h,'#3b2f21');
        drawRect(x,p.y,p.w,6,'#8b6b44');
      });
    }
    function drawPortals(){
      currentMap.portals.forEach(po=>{
        const x = po.x - GS.camX;
        drawRect(x,po.y,po.w,po.h,'rgba(103,232,249,.22)');
        CTX.strokeStyle='rgba(103,232,249,.7)'; CTX.strokeRect(x,po.y,po.w,po.h);
        drawText(po.label, x + po.w/2, po.y - 8, '#67e8f9', '11px monospace', 'center');
      });
    }
    function drawWorldDrops(){
      GS.worldDrops.forEach(d=>{
        const x = d.x - GS.camX;
        const item = ITEM_DATA[d.itemId];
        drawRect(x-9,d.y-9,18,18,'#ffcf4d');
        drawText(item?item.name:'ITEM', x, d.y - 14, '#fff', '10px monospace', 'center');
      });
    }
    function drawMonsters(){
      monsters.forEach(mon=>{
        const x = mon.x - GS.camX;
        CTX.globalAlpha = mon.hitCd>0 ? .55 : 1;
        drawRect(x, mon.y, mon.w, mon.h, mon.color);
        CTX.globalAlpha = 1;
        drawRect(x, mon.y - 8, mon.w, 4, 'rgba(0,0,0,.45)');
        drawRect(x, mon.y - 8, mon.w * (mon.hp / mon.maxHp), 4, '#ff6b78');
        drawText(mon.kind.toUpperCase(), x + mon.w/2, mon.y - 12, '#fff', '10px monospace', 'center');
      });
    }
    function drawOthers(){
      GS.others.forEach(o=>{
        const x = o.pos_x - GS.camX;
        drawRect(x,o.pos_y,30,50,'rgba(100,160,255,.65)');
        drawText(o.player_name || 'Player', x+15, o.pos_y - 8, '#9fd0ff', '11px monospace', 'center');
      });
    }
    function drawPlayer(){
      const x = P.pos_x - GS.camX;
      CTX.globalAlpha = P.invuln>0 && Math.floor(P.invuln/4)%2===0 ? .45 : 1;
      drawRect(x, P.pos_y, P.w, P.h, P.attackFlash>0 ? '#ffe699' : '#f3f5fb');
      CTX.globalAlpha = 1;
      drawText(P.name || 'NO NAME', x + P.w/2, P.pos_y - 12, '#ffcf4d', '12px monospace', 'center');
      if(P.attackFlash>0){
        const ax = P.facing>0 ? x + P.w : x - 26;
        drawRect(ax, P.pos_y + 12, 26, 12, 'rgba(255,255,255,.85)');
      }
    }
    function drawHitTexts(){
      GS.hitTexts.forEach(h=> drawText(h.text, h.x - GS.camX, h.y, h.color, 'bold 12px monospace', 'center'));
    }
    function drawHUD(){
      drawRect(14,14,270,90,'rgba(10,13,24,.66)');
      CTX.strokeStyle='rgba(255,255,255,.1)'; CTX.strokeRect(14,14,270,90);
      drawText(`${P.name || 'Guest'}  Lv.${P.level}  ${P.job}`, 24, 34, '#ffcf4d', 'bold 13px monospace');
      drawText(currentMap.name, 24, 52, '#9ec9ff', '12px monospace');
      drawText(`MESO ${P.meso} / CRY ${P.crystals}`, 24, 70, '#d7dced', '12px monospace');
      drawRect(330,18,240,12,'rgba(0,0,0,.45)');
      drawRect(330,18,240*(P.hp/getTotalMaxHp()),12,'#ff6b78');
      drawText(`HP ${Math.floor(P.hp)} / ${getTotalMaxHp()}`, 450, 28, '#fff', '11px monospace', 'center');
      drawRect(330,40,240,12,'rgba(0,0,0,.45)');
      drawRect(330,40,240*(P.mp/Math.max(1,getTotalMaxMp())),12,'#5da1ff');
      drawText(`MP ${Math.floor(P.mp)} / ${getTotalMaxMp()}`, 450, 50, '#fff', '11px monospace', 'center');
      drawRect(330,62,240,10,'rgba(0,0,0,.45)');
      drawRect(330,62,240*(P.exp/expToNext(P.level)),10,'#64df96');
      drawText(`EXP ${P.exp} / ${expToNext(P.level)}`, 450, 71, '#0b1410', '10px monospace', 'center');
      drawRect(730,14,216,76,'rgba(10,13,24,.66)');
      CTX.strokeStyle='rgba(255,255,255,.1)'; CTX.strokeRect(730,14,216,76);
      drawText('操作', 742, 34, '#67e8f9', 'bold 12px monospace');
      drawText('移動:A/D or ←→  ジャンプ:W/↑/Space', 742, 52, '#fff', '10px monospace');
      drawText('攻撃:J  インベントリ:I  ポータル接触で移動', 742, 68, '#fff', '10px monospace');
      if(GS.noticeText && performance.now() < GS.noticeUntil){
        drawRect(240, 500, 480, 24, GS.noticeOk ? 'rgba(28,90,54,.88)' : 'rgba(110,44,56,.88)');
        CTX.strokeStyle = GS.noticeOk ? 'rgba(100,223,150,.55)' : 'rgba(255,107,120,.55)';
        CTX.strokeRect(240, 500, 480, 24);
        drawText(GS.noticeText, 480, 516, '#fff', '12px monospace', 'center');
      }
    }
    function drawMapScene(){
      drawSky();
      drawParallax();
      drawPlatforms();
      drawPortals();
      drawWorldDrops();
      drawOthers();
      drawMonsters();
      drawPlayer();
      drawHitTexts();
      drawHUD();
    }
    function drawLoginScene(){
      const g = CTX.createLinearGradient(0,0,0,CVS.height);
      g.addColorStop(0,'#0f1530'); g.addColorStop(1,'#06070d');
      CTX.fillStyle=g; CTX.fillRect(0,0,CVS.width,CVS.height);
      drawText('ALTERA MMO', CVS.width/2, 220, '#ffcf4d', 'bold 40px monospace', 'center');
      drawText('ログインUIを表示中...', CVS.width/2, 260, '#dfe6f8', '14px monospace', 'center');
    }
    function drawCreateScene(){
      drawLoginScene();
      drawText('キャラクター作成', CVS.width/2, 300, '#67e8f9', 'bold 18px monospace', 'center');
    }

    function gameLoop(ts){
      GS.ts = ts;
      CTX.clearRect(0,0,CVS.width,CVS.height);
      if(isFormInteractionMode()) clearGameplayInputs();
      if(GS.scene === 'play' && currentMap){
        if(!GS.inventoryOpen){
          updatePlayer();
          updateMonsters();
          updateWorldDrops();
          updateHitTexts();
          updateAutosave(ts);
        }
        drawMapScene();
      }else if(GS.scene === 'create'){
        drawCreateScene();
      }else{
        drawLoginScene();
      }
      requestAnimationFrame(gameLoop);
    }

    function resizeCanvas(){
      const ratio = 960/540;
      let w = window.innerWidth, h = window.innerHeight;
      if(w/h > ratio) w = h * ratio; else h = w / ratio;
      CVS.style.width = w + 'px';
      CVS.style.height = h + 'px';
    }

    window.addEventListener('keydown', e=>{
      if(isTypingTarget(e.target) || isFormInteractionMode()) return;
      GS.keys[e.code] = true;
      if(GS.scene !== 'play') return;
      if(e.code === 'KeyJ'){ e.preventDefault(); basicAttack(); }
      if(e.code === 'KeyI'){ e.preventDefault(); toggleInventoryUI(); }
    });
    window.addEventListener('keyup', e=>{ if(isTypingTarget(e.target) || isFormInteractionMode()) return; GS.keys[e.code] = false; if(e.code==='Space') GS.mobile.jump=false; });

    qs('tabLogin').onclick = ()=>{ qs('tabLogin').classList.add('active'); qs('tabRegister').classList.remove('active'); qs('loginAction').textContent='ログイン'; qs('loginAction').onclick=doLogin; };
    qs('tabRegister').onclick = ()=>{ qs('tabRegister').classList.add('active'); qs('tabLogin').classList.remove('active'); qs('loginAction').textContent='新規登録'; qs('loginAction').onclick=doRegister; };
    qs('loginAction').onclick = doLogin;
    qs('createStartBtn').onclick = finalizeCharacterCreate;
    qs('btnCloseInv').onclick = hideInventoryUI;
    qs('btnEquip').onclick = ()=> equipItemByIndex(GS.selectedInvIndex);
    qs('btnUse').onclick = ()=> useItemByIndex(GS.selectedInvIndex);
    qs('btnDiscard').onclick = ()=> dropItemByIndex(GS.selectedInvIndex);
    qs('btnUnequip').onclick = ()=>{
      if(GS.selectedEquipSlot && P.equipped[GS.selectedEquipSlot]) return unequipSlot(GS.selectedEquipSlot);
      const slots=['weapon','head','body','accessory'];
      for(const s of slots){ if(P.equipped[s]) return unequipSlot(s); }
      liMsg('外せる装備がありません。');
    };

    (function initJoy(){
      const pad = qs('mobilePad'); const stick = qs('joyStick');
      let active = false, pid = null;
      function update(clientX, clientY){
        const r = pad.getBoundingClientRect();
        const cx = r.left + r.width/2, cy = r.top + r.height/2;
        let dx = clientX - cx, dy = clientY - cy;
        const dist = Math.hypot(dx,dy), max = 34;
        if(dist > max){ dx = dx / dist * max; dy = dy / dist * max; }
        stick.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
        GS.mobile.left = dx < -10; GS.mobile.right = dx > 10;
      }
      pad.addEventListener('pointerdown', e=>{ active=true; pid=e.pointerId; pad.setPointerCapture(pid); update(e.clientX,e.clientY); });
      pad.addEventListener('pointermove', e=>{ if(active && e.pointerId===pid) update(e.clientX,e.clientY); });
      function end(e){ if(e.pointerId!==pid) return; active=false; pid=null; GS.mobile.left=false; GS.mobile.right=false; stick.style.transform='translate(-50%,-50%)'; }
      pad.addEventListener('pointerup', end); pad.addEventListener('pointercancel', end);
    })();

    qs('btnJumpMobile').addEventListener('pointerdown', e=>{ e.preventDefault(); GS.mobile.jump = true; setTimeout(()=>GS.mobile.jump=false,120); });
    qs('btnAtkMobile').addEventListener('pointerdown', e=>{ e.preventDefault(); basicAttack(); });
    qs('btnBagMobile').addEventListener('pointerdown', e=>{ e.preventDefault(); toggleInventoryUI(); });

    window.addEventListener('beforeunload', ()=>{ savePlayerToLocal(); clearPresence(); });
    window.addEventListener('resize', resizeCanvas);
    window.addEventListener('blur', clearGameplayInputs);
    window.addEventListener('focusin', e=>{ if(isTypingTarget(e.target)) clearGameplayInputs(); });
    document.addEventListener('visibilitychange', ()=>{ if(document.hidden) clearGameplayInputs(); });

    async function boot(){
      resizeCanvas();
      initMobileUI();
      try{ await initSB(); }catch(err){ console.warn(err); }
      loadPlayerFromLocal();
      if(P.login_id) qs('loginId').value = P.login_id;
      if(P.login_id && P.password_hash && P.name){
        startGame();
        liMsg('ローカルセーブを読み込みました。', true);
      }else if(P.login_id && P.password_hash && !P.name){
        showCreateUI();
      }else{
        showLoginUI();
      }
      requestAnimationFrame(gameLoop);
    }

    boot();
  </script>
</body>
</html>

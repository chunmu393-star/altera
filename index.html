<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>ALTERA MMO MVP Complete</title>
  <style>
    :root{
      --bg:#06070d;--bg2:#101427;--panel:rgba(11,14,26,.96);--line:#252b4c;--txt:#d8ddf0;--muted:#8990ab;
      --blue:#5da1ff;--gold:#ffcf4d;--green:#64df96;--red:#ff6b78;--cyan:#67e8f9;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:#000;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;color:var(--txt);touch-action:none;-webkit-user-select:none;user-select:none}
    body{display:flex;align-items:center;justify-content:center}
    #gameCanvas{display:block;background:#0a0d16;max-width:100vw;max-height:100vh;image-rendering:auto;box-shadow:0 0 48px rgba(0,0,0,.42), 0 0 120px rgba(70,120,255,.10);border-radius:10px;filter:saturate(1.05) contrast(1.03)}
    #rotateMsg{display:none;position:fixed;inset:0;z-index:3000;background:#000;align-items:center;justify-content:center;flex-direction:column;gap:10px;color:var(--gold);font-size:22px;text-align:center}
    @media (orientation: portrait){#rotateMsg{display:flex}}
    .overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(5,7,13,.82);backdrop-filter:blur(6px);z-index:2000}
    .hidden{display:none !important}
    .card{width:min(420px,calc(100vw - 26px));background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,.45)}
    .logo{font-size:32px;font-weight:800;letter-spacing:4px;text-align:center;color:var(--gold)}
    .sub{font-size:11px;color:var(--muted);text-align:center;margin:4px 0 18px}
    .tabs{display:flex;gap:8px;margin-bottom:14px}
    .tab{flex:1;border:1px solid var(--line);background:#171d33;color:var(--txt);padding:10px 12px;border-radius:10px;cursor:pointer}
    .tab.active{background:linear-gradient(180deg,#2b5fbc,#214a94);border-color:#3e78db}
    .field{margin-bottom:12px}
    .label{font-size:11px;color:var(--muted);margin-bottom:6px}
    .input,.select{width:100%;padding:12px;border-radius:10px;border:1px solid var(--line);background:#0f1324;color:var(--txt);outline:none}
    .input:focus,.select:focus{border-color:#4278db;box-shadow:0 0 0 2px rgba(66,120,219,.2)}
    .msg{min-height:18px;font-size:11px;color:var(--red);margin:6px 0 2px}
    .ok{color:var(--green)}
    .btnRow{display:flex;gap:10px;margin-top:10px}
    .btn{flex:1;padding:12px;border-radius:10px;border:1px solid var(--line);background:#18203a;color:var(--txt);font-weight:700;cursor:pointer}
    .btn.primary{background:linear-gradient(180deg,#6aaeff,#4d87ea);color:#08111d;border-color:#67a0f5}
    .btn.gold{background:linear-gradient(180deg,#ffd76b,#e2a92f);color:#1a1203;border-color:#efc551}
    .btn:disabled{opacity:.5;cursor:not-allowed}
    .note{font-size:10px;color:var(--muted);line-height:1.55;margin-top:10px}

    #mobilePad,#mobileButtons{position:fixed;z-index:1500}
    #mobilePad{left:18px;bottom:18px;width:128px;height:128px;border-radius:50%;background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.15);display:none}
    #mobilePad.show{display:block}
    #joyStick{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:54px;height:54px;border-radius:50%;background:rgba(255,255,255,.28);pointer-events:none}
    #mobileButtons{right:18px;bottom:18px;display:none;gap:12px;align-items:flex-end}
    #mobileButtons.show{display:flex}
    .mBtn{width:70px;height:70px;border-radius:50%;border:2px solid rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700;background:rgba(255,255,255,.08);backdrop-filter:blur(3px)}
    .mBtn.attack{background:rgba(255,90,110,.23);border-color:rgba(255,90,110,.45)}
    .mBtn.jump{background:rgba(90,140,255,.23);border-color:rgba(90,140,255,.45);margin-bottom:70px}
    .mBtn.bag{background:rgba(255,207,77,.18);border-color:rgba(255,207,77,.42)}

    #inventoryOverlay .card{width:min(780px,calc(100vw - 24px))}
    .invGrid{display:grid;grid-template-columns:240px 1fr;gap:16px}
    .panelTitle{font-size:13px;color:var(--gold);margin-bottom:10px}
    .slot{display:flex;justify-content:space-between;align-items:center;padding:10px;border-radius:10px;border:1px solid var(--line);background:#101525;margin-bottom:8px;font-size:12px}
    .items{max-height:420px;overflow:auto;border:1px solid var(--line);border-radius:12px;background:#0d1221;padding:8px}
    .item{padding:10px;border-radius:10px;border:1px solid transparent;cursor:pointer;font-size:12px;display:flex;justify-content:space-between;gap:8px}
    .item:hover{background:#131b31}
    .item.selected{background:#14213e;border-color:#3968c3}
    .detail{border:1px solid var(--line);border-radius:12px;background:#101525;padding:12px;min-height:170px;font-size:12px;line-height:1.6}
    .muted{color:var(--muted)}
    .savePreview{margin:10px 0 2px;padding:12px;border:1px solid var(--line);border-radius:12px;background:#0f1425;font-size:11px;line-height:1.55}
    .savePreview b{color:var(--gold)}
    .savePreview.hidden{display:none}
    .chatPanel{position:fixed;left:14px;bottom:14px;width:320px;z-index:1400;background:rgba(7,10,18,.9);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:10px;backdrop-filter:blur(4px)}
    .chatPanel.hidden{display:none}
    .chatHead{font-size:11px;color:var(--gold);margin-bottom:6px}
    .chatLog{height:118px;overflow:auto;background:#0d1221;border:1px solid var(--line);border-radius:10px;padding:8px;font-size:11px;line-height:1.5}
    .chatLine{margin-bottom:5px;word-break:break-word}
    .chatLine .name{color:#9fd0ff}
    .chatLine.system{color:#9be7b5}
    .chatInputRow{display:flex;gap:8px;margin-top:8px}
    .chatInput{flex:1;padding:10px;border-radius:10px;border:1px solid var(--line);background:#101525;color:var(--txt);outline:none}
    .miniBtn{padding:10px 12px;border-radius:10px;border:1px solid var(--line);background:#18203a;color:var(--txt);font-weight:700;cursor:pointer}
    .mBtn.skill{background:rgba(103,232,249,.18);border-color:rgba(103,232,249,.35);width:56px;height:56px;font-size:11px}
  </style>
</head>
<body>
  <div id="rotateMsg"><div style="font-size:56px">📱↩</div><div>横向きにしてください</div></div>
  <canvas id="gameCanvas" width="1280" height="720"></canvas>

  <div id="loginOverlay" class="overlay hidden">
    <div class="card">
      <div class="logo">ALTERA</div>
      <div class="sub">2D SIDE-SCROLL MMO MVP COMPLETE</div>
      <div class="tabs">
        <button id="tabLogin" class="tab active">ログイン</button>
        <button id="tabRegister" class="tab">新規登録</button>
      </div>
      <div class="field">
        <div class="label">ログインID</div>
        <input id="loginId" class="input" placeholder="3〜20文字 / 英数と_" maxlength="20">
      </div>
      <div class="field">
        <div class="label">パスワード</div>
        <input id="loginPw" class="input" type="password" placeholder="6文字以上" maxlength="64">
      </div>
      <div id="loginMsg" class="msg"></div>
      <div id="localSavePreview" class="savePreview hidden"></div>
      <div class="btnRow">
        <button id="loginAction" class="btn primary">ログイン</button>
      </div>
      <div class="btnRow" style="margin-top:8px">
        <button id="quickContinueBtn" class="btn">ローカルセーブから続き</button>
      </div>
      <div class="note">初回は新規登録 → キャラクター名を決定 → ゲーム開始。<br>保存はローカル + Supabase に行います。</div>
    </div>
  </div>

  <div id="createOverlay" class="overlay hidden">
    <div class="card">
      <div class="logo">CHARACTER CREATE</div>
      <div class="sub">最初のキャラクターを作成</div>
      <div class="field">
        <div class="label">キャラクター名</div>
        <input id="charName" class="input" placeholder="2〜12文字" maxlength="12">
      </div>
      <div class="field">
        <div class="label">職業</div>
        <select id="charJob" class="select">
          <option value="Novice">Novice</option>
          <option value="Warrior">Warrior</option>
          <option value="Archer">Archer</option>
          <option value="Mage">Mage</option>
        </select>
      </div>
      <div id="createMsg" class="msg"></div>
      <div class="btnRow">
        <button id="createStartBtn" class="btn gold">この名前で始める</button>
      </div>
      <div class="note">職業はMVP用の初期値です。後で分岐拡張できます。</div>
    </div>
  </div>

  <div id="inventoryOverlay" class="overlay hidden">
    <div class="card">
      <div class="logo" style="font-size:24px">INVENTORY</div>
      <div class="sub">I キー / BAG ボタンで開閉</div>
      <div class="invGrid">
        <div>
          <div class="panelTitle">装備</div>
          <div id="equipSlots"></div>
          <div class="panelTitle" style="margin-top:14px">能力値</div>
          <div id="statPreview" class="detail"></div>
        </div>
        <div>
          <div class="panelTitle">所持アイテム</div>
          <div id="inventoryList" class="items"></div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px">
            <div id="itemDetail" class="detail"><span class="muted">アイテムを選択してください。</span></div>
            <div>
              <div class="btnRow" style="margin-top:0"><button id="btnUse" class="btn">使う</button><button id="btnEquip" class="btn primary">装備</button></div>
              <div class="btnRow"><button id="btnUnequip" class="btn">外す</button><button id="btnDiscard" class="btn">捨てる</button></div>
              <div class="btnRow"><button id="btnCloseInv" class="btn gold">閉じる</button></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="mobilePad"><div id="joyStick"></div></div>
  <div id="mobileButtons">
    <div id="btnSkill1Mobile" class="mBtn skill">S1</div>
    <div id="btnSkill2Mobile" class="mBtn skill">S2</div>
    <div id="btnSkill3Mobile" class="mBtn skill">S3</div>
    <div id="btnBagMobile" class="mBtn bag">BAG</div>
    <div id="btnJumpMobile" class="mBtn jump">JUMP</div>
    <div id="btnAtkMobile" class="mBtn attack">ATK</div>
  </div>
  <div id="chatPanel" class="chatPanel hidden">
    <div class="chatHead">CHAT / SYSTEM LOG <span style="color:#7f87a4">(Tで入力)</span></div>
    <div id="chatStatusBar" style="margin:0 0 6px 0;padding:6px 8px;border-radius:8px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);font-size:11px;color:#b7c1df;display:none"></div>
    <div id="chatLog" class="chatLog"></div>
    <div class="chatInputRow">
      <input id="chatInput" class="chatInput" maxlength="80" placeholder="メッセージを入力">
      <button id="chatSendBtn" class="miniBtn">送信</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
    const SUPABASE_URL = 'YOUR_SUPABASE_URL';
    const SUPABASE_KEY = 'YOUR_SUPABASE_ANON_KEY';
    const ADMIN_VISUAL_STORAGE_KEY = 'altera_admin_asset_config_v1';
    const ADMIN_STORAGE_SETTINGS_KEY = 'altera_admin_storage_upload_v1';
    const GAME_SUPABASE_SETTINGS_KEY = 'altera_game_supabase_settings_v1';

    const VIEW_W = 1280;
    const VIEW_H = 720;
    const CVS = document.getElementById('gameCanvas');
    const CTX = CVS.getContext('2d', { alpha:false, desynchronized:true });
    let sb = null;
    let runtimeSupabaseConfig = null;

    function sanitizeRuntimeSupabaseConfig(source, label='') {
      if(!source || typeof source !== 'object') return null;
      const url = String(source.supabaseUrl || source.url || '').trim();
      const key = String(source.supabaseAnonKey || source.anonKey || source.key || '').trim();
      if(!url || !key) return null;
      if(url.includes('YOUR_SUPABASE_URL') || key.includes('YOUR_SUPABASE_ANON_KEY')) return null;
      return { url, key, label: label || source.label || 'runtime' };
    }

    function getRuntimeSupabaseConfig(){
      if(runtimeSupabaseConfig) return runtimeSupabaseConfig;
      const candidates = [];
      try{
        const saved = safeParseJSON(localStorage.getItem(GAME_SUPABASE_SETTINGS_KEY) || 'null', null);
        const parsed = sanitizeRuntimeSupabaseConfig(saved, 'game-local');
        if(parsed) candidates.push(parsed);
      }catch(_){}
      try{
        const uploadSettings = safeParseJSON(localStorage.getItem(ADMIN_STORAGE_SETTINGS_KEY) || 'null', null) || {};
        const parsed = sanitizeRuntimeSupabaseConfig({
          supabaseUrl: uploadSettings.supabaseUrl,
          supabaseAnonKey: uploadSettings.supabaseAnonKey
        }, 'admin-upload-settings');
        if(parsed) candidates.push(parsed);
      }catch(_){}
      try{
        const parsed = sanitizeRuntimeSupabaseConfig(window.ALTERA_SUPABASE_CONFIG || null, 'window');
        if(parsed) candidates.push(parsed);
      }catch(_){}
      const inlineParsed = sanitizeRuntimeSupabaseConfig({ supabaseUrl: SUPABASE_URL, supabaseAnonKey: SUPABASE_KEY }, 'inline');
      if(inlineParsed) candidates.push(inlineParsed);
      runtimeSupabaseConfig = candidates.find(Boolean) || null;
      return runtimeSupabaseConfig;
    }

    function applyRenderQuality(){
      CVS.width = VIEW_W;
      CVS.height = VIEW_H;
      CTX.imageSmoothingEnabled = true;
      CTX.imageSmoothingQuality = 'high';
      CTX.textBaseline = 'alphabetic';
      CTX.lineJoin = 'round';
      CTX.lineCap = 'round';
    }

    const GS = {
      scene:'boot',
      mapId:'z01_m01',
      camX:0,
      keys:{},
      ts:0,
      lastSave:0,
      lastPresence:0,
      localLoaded:false,
      inventoryOpen:false,
      selectedInvIndex:0,
      hitTexts:[],
      worldDrops:[],
      others:[],
      mobile:{left:false,right:false,jump:false,attack:false},
      pendingLogin:null,
      selectedEquipSlot:null,
      noticeText:'',
      noticeOk:false,
      noticeUntil:0,
      saveStateText:'',
      saveStateOk:true,
      saveStateUntil:0,
      isSubmitting:false,
      activeAuthTab:'login',
      respawnQueue:[],
      chatMessages:[],
      chatSeen:new Set(),
      masterDataSource:'embedded',
      masterDataLoaded:false,
      masterDataError:'',
      masterDataStats:null,
      chatChannel:null,
      presenceChannel:null,
      chatOnline:false,
      presenceOnline:false,
      onlineError:'',
      interactionText:'',
      interactionUntil:0,
      questToast:'',
      questToastUntil:0,
      npcDialogue:null,
      selectedQuestId:'',
      lastInteractAt:0,
      lastChatPoll:0,
      lastChatFetch:0,
      skillFx:[],
      camShake:0,
      debugMsg:''
    };

    const ASSET_PATHS = {
      backgrounds:{
        sky:'',
        parallaxFar:'',
        parallaxMid:''
      },
      player:{
        idle:'',
        attack:'',
        hit:''
      },
      others:{
        player:'',
        ghost:''
      },
      monsters:{
        slime:'',
        shroom:'',
        bat:'',
        wolf:''
      },
      world:{
        platform:'',
        portal:'',
        dropDefault:''
      },
      items:{
        rusty_sword:'',
        novice_cap:'',
        leather_vest:'',
        green_charm:'',
        red_potion:'',
        blue_potion:''
      },
      skills:{
        burst_hit:'',
        first_aid:'',
        lucky_dash:'',
        power_slash:'',
        guard_up:'',
        charge:'',
        double_shot:'',
        quick_step:'',
        pierce:'',
        fire_orb:'',
        meditate:'',
        frost_nova:''
      }
    };

    const ASSET_IMAGES = {};

    function loadImageAsset(key, src){
      if(!src) return null;
      if(ASSET_IMAGES[key]) return ASSET_IMAGES[key];
      const img = new Image();
      img.decoding = 'async';
      img.src = src;
      ASSET_IMAGES[key] = img;
      return img;
    }
    function preloadConfiguredAssets(){
      for(const [groupKey, groupVal] of Object.entries(ASSET_PATHS)){
        if(!groupVal || typeof groupVal !== 'object') continue;
        for(const [name, src] of Object.entries(groupVal)){
          if(src) loadImageAsset(`${groupKey}.${name}`, src);
        }
      }
    }
    function getConfiguredAsset(group, name){
      const src = ASSET_PATHS?.[group]?.[name] || '';
      if(!src) return null;
      const img = loadImageAsset(`${group}.${name}`, src);
      return img && img.complete && img.naturalWidth > 0 ? img : null;
    }
    function drawImageFit(img, x, y, w, h, opts={}){
      if(!img) return false;
      CTX.save();
      if(opts.alpha != null) CTX.globalAlpha = opts.alpha;
      if(opts.flipX){
        CTX.translate(x + w, y);
        CTX.scale(-1, 1);
        CTX.drawImage(img, 0, 0, w, h);
      }else{
        CTX.drawImage(img, x, y, w, h);
      }
      CTX.restore();
      return true;
    }
    function getPlayerAssetKey(){
      if(P.invuln > 0) return 'hit';
      if(P.attackFlash > 0) return 'attack';
      return 'idle';
    }
    function getOtherPlayerAssetKey(){
      return 'player';
    }
    function getMonsterAssetKey(kind){
      return kind;
    }
    function getItemAssetKey(itemId){
      return itemId || 'dropDefault';
    }
    function getSkillAssetKey(skillId){
      return skillId || '';
    }

    const SKILL_ANIM_PRESETS = {
      slash_arc:{
        layers:[
          {type:'slash', offsetMul:0.42, sizeMul:1.0},
          {type:'sprite', anchor:'front', offsetMul:0.34, width:170, height:100, life:14, grow:0.03, alpha:0.95}
        ]
      },
      support_aura:{
        layers:[
          {type:'aura', radius:42, life:28},
          {type:'ring', radius:26, life:20},
          {type:'sprite', anchor:'self', width:120, height:120, life:20, grow:0.025, alpha:0.82}
        ]
      },
      rush_trail:{
        layers:[
          {type:'dash', width:12, life:10},
          {type:'trail', widthMul:1.0, life:12},
          {type:'sprite', anchor:'front', offsetMul:0.52, width:196, height:88, life:12, grow:0.028, alpha:0.88}
        ]
      },
      dual_beam:{
        layers:[
          {type:'beam_pair', spreadY:18, width:6, life:12},
          {type:'sprite', anchor:'tip', width:92, height:92, life:12, grow:0.03, alpha:0.92}
        ]
      },
      pierce_line:{
        layers:[
          {type:'beam', width:9, life:14},
          {type:'slash', offsetMul:0.56, sizeMul:1.2},
          {type:'sprite', anchor:'tip', width:110, height:74, life:12, grow:0.026, alpha:0.9}
        ]
      },
      orb_beam:{
        layers:[
          {type:'beam', width:10, life:16},
          {type:'aura_tip', distanceMul:0.36, radius:20, life:14},
          {type:'sprite', anchor:'tip', width:104, height:104, life:16, grow:0.028, alpha:0.94}
        ]
      },
      burst_ring:{
        layers:[
          {type:'nova', radiusMul:1.0},
          {type:'ring', radius:42, life:20},
          {type:'sprite', anchor:'self', width:170, height:170, life:18, grow:0.04, alpha:0.9}
        ]
      }
    };
    const SKILL_ANIM_BY_ID = {
      burst_hit:{preset:'slash_arc', sizeMul:0.92},
      first_aid:{preset:'support_aura', radius:46, ringCount:1},
      lucky_dash:{preset:'rush_trail', width:10},
      power_slash:{preset:'slash_arc', sizeMul:1.18},
      guard_up:{preset:'support_aura', radius:50, ringCount:2},
      charge:{preset:'rush_trail', width:14},
      double_shot:{preset:'dual_beam', beamWidth:6},
      quick_step:{preset:'support_aura', radius:40, ringCount:1},
      pierce:{preset:'pierce_line', beamWidth:8},
      fire_orb:{preset:'orb_beam', radius:20},
      meditate:{preset:'support_aura', radius:44, ringCount:1},
      frost_nova:{preset:'burst_ring', radius:120, ringCount:1}
    };


    const ADMIN_ASSET_STORAGE_KEY = 'altera_admin_asset_config_v1';
    const DEFAULT_ASSET_PATHS = JSON.parse(JSON.stringify(ASSET_PATHS));
    const DEFAULT_SKILL_ANIM_BY_ID = JSON.parse(JSON.stringify(SKILL_ANIM_BY_ID));

    function resetNestedObject(target, template){
      for(const key of Object.keys(target)){
        if(target[key] && typeof target[key] === 'object' && !Array.isArray(target[key])){
          resetNestedObject(target[key], template?.[key] || {});
        }else{
          target[key] = template && Object.prototype.hasOwnProperty.call(template, key) ? template[key] : target[key];
        }
      }
    }
    function mergeKnownNested(target, source){
      if(!source || typeof source !== 'object') return;
      for(const [key, value] of Object.entries(source)){
        if(!Object.prototype.hasOwnProperty.call(target, key)) continue;
        if(target[key] && typeof target[key] === 'object' && !Array.isArray(target[key]) && value && typeof value === 'object' && !Array.isArray(value)){
          mergeKnownNested(target[key], value);
        }else{
          target[key] = value;
        }
      }
    }
    function clearConfiguredAssetCache(){
      for(const key of Object.keys(ASSET_IMAGES)) delete ASSET_IMAGES[key];
    }
    function getAdminVisualConfigSnapshot(){
      return {
        assets: JSON.parse(JSON.stringify(ASSET_PATHS)),
        skillAnim: JSON.parse(JSON.stringify(SKILL_ANIM_BY_ID))
      };
    }
    function applyAdminVisualConfig(config){
      resetNestedObject(ASSET_PATHS, DEFAULT_ASSET_PATHS);
      resetNestedObject(SKILL_ANIM_BY_ID, DEFAULT_SKILL_ANIM_BY_ID);
      if(config && typeof config === 'object'){
        mergeKnownNested(ASSET_PATHS, config.assets || {});
        mergeKnownNested(SKILL_ANIM_BY_ID, config.skillAnim || {});
      }
      clearConfiguredAssetCache();
      preloadConfiguredAssets();
    }
    function loadAdminVisualConfig(){
      try{
        const raw = localStorage.getItem(ADMIN_ASSET_STORAGE_KEY);

    function getSkillAnimConfig(skill){
      const baseByType = skill?.type === 'dash' ? { preset:'rush_trail' }
        : skill?.type === 'burst' ? { preset:'burst_ring' }
        : (skill?.type === 'heal' || skill?.type === 'mp_restore' || skill?.type === 'buff_def' || skill?.type === 'buff_speed') ? { preset:'support_aura' }
        : skill?.id === 'double_shot' ? { preset:'dual_beam' }
        : skill?.id === 'fire_orb' ? { preset:'orb_beam' }
        : { preset:'slash_arc' };
      const overrides = SKILL_ANIM_BY_ID[skill?.id] || {};
      const presetName = overrides.preset || baseByType.preset || 'slash_arc';
      const preset = SKILL_ANIM_PRESETS[presetName] || SKILL_ANIM_PRESETS.slash_arc;
      return {
        ...baseByType,
        ...preset,
        ...overrides,
        preset:presetName,
        color:skill?.color || overrides.color || '#ffffff'
      };
    }
    function spawnSkillSpriteFx(skillId, x, y, opts={}){
      addSkillFx({
        kind:'sprite',
        skillId,
        assetKey:opts.assetKey || getSkillAssetKey(skillId),
        x,
        y,
        w:opts.width || 120,
        h:opts.height || 120,
        scale:opts.scale || 1,
        grow:opts.grow || 0.02,
        rotation:opts.rotation || 0,
        spin:opts.spin || 0,
        driftX:opts.driftX || 0,
        driftY:opts.driftY || 0,
        alpha:opts.alpha == null ? 0.92 : opts.alpha,
        flipX:opts.flipX,
        fallbackColor:opts.fallbackColor || '#ffffff',
        life:opts.life || 16
      });
    }
    function spawnSkillBurstFx(skillId, x, y, color, radius, life=18){
      addSkillFx({kind:'ring', x, y, radius, color, life});
      spawnSkillSpriteFx(skillId, x, y, { width:radius*1.9, height:radius*1.9, life, grow:0.03, alpha:0.72, fallbackColor:color });
    }
    function spawnSkillTrailFx(skillId, fromX, toX, y, color, width=12, life=12){
      addSkillFx({kind:'trail', x:(fromX + toX) * 0.5, y, color, size:Math.abs(toX - fromX), thickness:width * 1.7, life});
      spawnSkillSpriteFx(skillId, (fromX + toX) * 0.5, y, { width:Math.max(96, Math.abs(toX - fromX)), height:Math.max(42, width * 4.5), life, alpha:0.82, grow:0.02, fallbackColor:color });
    }
    function getSkillAnimAnchor(skill, ctx, layer){
      const range = skill?.range || 100;
      const anchor = layer.anchor || 'self';
      if(anchor === 'tip') return { x:ctx.cx + P.facing * range, y:ctx.cy + (layer.offsetY || 0) };
      if(anchor === 'front') return { x:ctx.cx + P.facing * Math.min(range, 100) * (layer.offsetMul || 0.45), y:ctx.cy + (layer.offsetY || 0) };
      return { x:ctx.cx + P.facing * (layer.offsetX || 0), y:ctx.cy + (layer.offsetY || 0) };
    }
    function playSkillAnimation(skill, ctx){
      const conf = getSkillAnimConfig(skill);
      const color = conf.color || skill.color || '#ffffff';
      const range = skill.range || 100;
      const beamEndX = ctx.cx + P.facing * range;
      for(const layer of conf.layers || []){
        if(layer.type === 'slash'){
          spawnSlashFx(ctx.cx + P.facing * Math.min(78, range * (layer.offsetMul || 0.42)), ctx.cy + (layer.offsetY || 0), P.facing, color, Math.min(190, range * (layer.sizeMul || conf.sizeMul || 1)));
        }else if(layer.type === 'beam_pair'){
          const spread = layer.spreadY || 16;
          const width = conf.beamWidth || layer.width || 6;
          spawnBeamFx(ctx.cx, ctx.cy - spread * 0.5, beamEndX, ctx.cy - spread, color, width, layer.life || 12);
          spawnBeamFx(ctx.cx, ctx.cy + spread * 0.35, beamEndX, ctx.cy + spread * 0.7, color, width, (layer.life || 12) + 2);
        }else if(layer.type === 'beam'){
          spawnBeamFx(ctx.cx, ctx.cy + (layer.offsetY || 0), beamEndX, ctx.cy + (layer.endOffsetY || 0), color, conf.beamWidth || layer.width || 8, layer.life || 12);
        }else if(layer.type === 'aura'){
          spawnAuraFx(ctx.cx + P.facing * (layer.offsetX || 0), ctx.cy + (layer.offsetY || 0), color, conf.radius || layer.radius || 42, layer.life || 28);
        }else if(layer.type === 'aura_tip'){
          spawnAuraFx(ctx.cx + P.facing * range * (layer.distanceMul || 0.36), ctx.cy + (layer.offsetY || 0), color, conf.radius || layer.radius || 20, layer.life || 14);
        }else if(layer.type === 'nova'){
          spawnNovaFx(ctx.cx, ctx.cy, color, conf.radius || layer.radius || range);
        }else if(layer.type === 'ring'){
          for(let i=0;i<Math.max(1, conf.ringCount || 1);i++){
            addSkillFx({kind:'ring', x:ctx.cx, y:ctx.cy, radius:(conf.radius || layer.radius || 28) * (1 + i * 0.18), color, life:(layer.life || 18) + i * 2});
          }
        }else if(layer.type === 'dash'){
          spawnDashFx(ctx.cx, beamEndX, ctx.cy, color);
        }else if(layer.type === 'trail'){
          spawnSkillTrailFx(skill.id, ctx.cx, beamEndX, ctx.cy, color, conf.width || layer.width || 12, layer.life || 12);
        }else if(layer.type === 'sprite'){
          const pos = getSkillAnimAnchor(skill, ctx, layer);
          spawnSkillSpriteFx(skill.id, pos.x, pos.y, {
            width:layer.width || Math.max(96, range * 0.9),
            height:layer.height || Math.max(72, range * 0.55),
            life:layer.life || 14,
            alpha:layer.alpha,
            grow:layer.grow,
            spin:layer.spin || 0,
            flipX:P.facing < 0,
            fallbackColor:color
          });
        }
      }
      if(conf.preset === 'burst_ring'){
        spawnSkillBurstFx(skill.id, ctx.cx, ctx.cy, color, Math.max(32, (conf.radius || range) * 0.42), 18);
      }
    }

    function pushChatMessage(name, text, type='player', extra={}){
      const line = typeof name === 'object'
        ? { ...name }
        : { name, text, type, ...extra };
      line.name = String(line.name || (line.type === 'system' ? 'SYSTEM' : 'Player'));
      line.text = String(line.text || '').trim();
      line.type = line.type || type || 'player';
      line.map_id = line.map_id || P.map_id || 'z01_m01';
      line.at = typeof line.at === 'number' ? line.at : new Date(line.at || Date.now()).getTime();
      if(line.id){
        line.id = String(line.id);
        if(GS.chatSeen.has(line.id)) return false;
        GS.chatSeen.add(line.id);
      }
      if(!line.text && line.type !== 'system') return false;
      GS.chatMessages.push(line);
      GS.chatMessages = GS.chatMessages.slice(-40);
      rebuildChatSeen();
      saveChatLocal();
      renderChatLog();
      return true;

        const meta = `<span style="color:#7f87a4">${formatChatTime(m.at)}</span>`;
        if(m.type === 'system') return `<div class="chatLine system">${meta} SYSTEM: ${escapeHtml(m.text)}</div>`;
        return `<div class="chatLine">${meta} ${mapTag}<span class="name">${escapeHtml(m.name)}</span>: ${escapeHtml(m.text)}</div>`;
      }).join('') || '<div class="chatLine system">SYSTEM: ようこそ ALTERA へ</div>';

    function pruneOtherPlayers(){
      GS.others = (GS.others || []).filter(row=>{
        const updatedAt = row && row.updated_at ? new Date(row.updated_at).getTime() : Date.now();
        return row && row.player_id !== P.id && row.map_id === P.map_id && row.online !== false && (Date.now() - updatedAt) < 30000;
      });
    }

    function reconcilePresenceRow(row, eventType='UPSERT'){
      if(!row || !row.player_id || row.player_id === P.id) return;
      const list = GS.others || [];
      const idx = list.findIndex(x=>x.player_id === row.player_id);
      const updatedAt = row.updated_at ? new Date(row.updated_at).getTime() : Date.now();
      const alive = eventType !== 'DELETE' && row.online !== false && row.map_id === P.map_id && (Date.now() - updatedAt) < 30000;
      if(!alive){
        if(idx >= 0) list.splice(idx, 1);
        GS.others = list;
        return;
      }
      const merged = { ...list[idx] || {}, ...row };
      if(idx >= 0) list[idx] = merged;
      else list.push(merged);
      GS.others = list;
      pruneOtherPlayers();
    }

      try{
        const client = await initSB();
        if(GS.chatChannel) return;
        GS.chatChannel = client.channel('altera-mmo-chat-stream')
          .on('postgres_changes', { event:'INSERT', schema:'public', table:'mmo_chat' }, payload=>{
            const row = payload.new || {};
            const added = pushChatMessage(row.player_name || 'Player', row.message || '', 'player', {
              id:`chat-${row.id}`,
              at: row.created_at ? new Date(row.created_at).getTime() : Date.now(),
              map_id: row.map_id || 'global'

              GS.noticeText = `CHAT ${row.player_name}: ${row.message}`;

    function setMasterDataRequiredMessage(message){
      ['loginMsg','createMsg'].forEach(id=>{
        const el = qs(id);
        if(!el) return;
        el.textContent = message || '';
        el.className = 'msg';
      });
    }

    function ensureMasterDataReady(showMessage=true){
      if(GS.masterDataLoaded) return true;
      if(showMessage) setMasterDataRequiredMessage(`DBマスターデータ必須: ${GS.masterDataError || 'Supabaseのマスター読込に失敗しました。SQLを投入して設定を保存してください。'}`);
      return false;
    }

    async function loadMasterDataFromDB(){
      const config = getRuntimeSupabaseConfig();
      if(!config) return { ok:false, source:'embedded', reason:'no-config' };
      const client = await initSB();
      const [
        itemsRes,
        monstersRes,
        dropsRes,
        mapsRes,
        platformsRes,
        portalsRes,
        spawnsRes,
        npcsRes,
        questsRes,
        objectivesRes
      ] = await Promise.all([
        client.from('mmo_master_items').select('*').order('id', { ascending:true }),
        client.from('mmo_master_monsters').select('*').order('id', { ascending:true }),
        client.from('mmo_master_drops').select('*').order('monster_id', { ascending:true }).order('seq', { ascending:true }),
        client.from('mmo_master_maps').select('*').order('display_order', { ascending:true }),
        client.from('mmo_master_map_platforms').select('*').order('map_id', { ascending:true }).order('seq', { ascending:true }),
        client.from('mmo_master_map_portals').select('*').order('map_id', { ascending:true }).order('seq', { ascending:true }),
        client.from('mmo_master_map_spawns').select('*').order('map_id', { ascending:true }).order('seq', { ascending:true }),
        client.from('mmo_master_npcs').select('*').order('map_id', { ascending:true }).order('id', { ascending:true }),
        client.from('mmo_master_quests').select('*').order('display_order', { ascending:true }),
        client.from('mmo_master_quest_objectives').select('*').order('quest_id', { ascending:true }).order('seq', { ascending:true })
      ]);
      const all = [itemsRes, monstersRes, dropsRes, mapsRes, platformsRes, portalsRes, spawnsRes, npcsRes, questsRes, objectivesRes];
      const failed = all.find(r => r && r.error);
      if(failed) throw failed.error;

      const nextItems = Object.fromEntries((itemsRes.data || []).map(row => [row.id, {
        id:row.id,
        name:row.name,
        type:row.item_type,
        atk:Number(row.atk || 0),
        def:Number(row.def || 0),
        maxHp:Number(row.max_hp || 0),
        maxMp:Number(row.max_mp || 0),
        healHp:Number(row.heal_hp || 0),
        healMp:Number(row.heal_mp || 0),
        desc:row.description || ''
      }]));

      const nextMonsters = Object.fromEntries((monstersRes.data || []).map(row => [row.id, {
        w:Number(row.width || 0),
        h:Number(row.height || 0),
        maxHp:Number(row.max_hp || 1),
        atk:Number(row.atk || 0),
        def:Number(row.def || 0),
        exp:Number(row.exp_reward || 0),
        color:row.color || '#ffffff',
        speed:Number(row.move_speed || 0),
        jump:Number(row.jump_power || 0),
        fly:!!row.is_flying
      }]));

      const nextDrops = {};
      (dropsRes.data || []).forEach(row => {
        if(!nextDrops[row.monster_id]) nextDrops[row.monster_id] = [];
        nextDrops[row.monster_id].push({
          itemId:row.item_id,
          chance:Number(row.chance || 0),
          min:Math.max(1, Number(row.min_qty || 1)),
          max:Math.max(1, Number(row.max_qty || 1))
        });
      });

      const nextMaps = {};
      (mapsRes.data || []).forEach(row => {
        nextMaps[row.id] = {
          id:row.id,
          name:row.name,
          bg1:row.bg1,
          bg2:row.bg2,
          width:Number(row.map_width || 0),
          ground:Number(row.ground_y || 0),
          platforms:[],
          portals:[],
          monsters:[]
        };
      });
      (platformsRes.data || []).forEach(row => {
        const map = nextMaps[row.map_id];
        if(!map) return;
        map.platforms.push({ x:Number(row.x || 0), y:Number(row.y || 0), w:Number(row.width || 0), h:Number(row.height || 0) });
      });
      (portalsRes.data || []).forEach(row => {
        const map = nextMaps[row.map_id];
        if(!map) return;
        map.portals.push({
          x:Number(row.x || 0),
          y:Number(row.y || 0),
          w:Number(row.width || 0),
          h:Number(row.height || 0),
          to:row.to_map_id,
          tx:Number(row.target_x || 0),
          ty:Number(row.target_y || 0),
          label:row.label || ''
        });
      });
      (spawnsRes.data || []).forEach(row => {
        const map = nextMaps[row.map_id];
        if(!map) return;
        map.monsters.push({ kind:row.monster_id, x:Number(row.x || 0), y:Number(row.y || 0) });
      });

      const nextNpcsByMap = {};
      (npcsRes.data || []).forEach(row => {
        if(!nextNpcsByMap[row.map_id]) nextNpcsByMap[row.map_id] = [];
        nextNpcsByMap[row.map_id].push({
          id:row.id,
          name:row.name,
          title:row.title,
          x:Number(row.x || 0),
          y:Number(row.y || 0),
          w:Number(row.width || 0),
          h:Number(row.height || 0),
          color:row.color || '#ffffff'
        });
      });

      const nextQuestDefs = {};
      const nextQuestOrder = [];
      (questsRes.data || []).forEach(row => {
        nextQuestDefs[row.id] = {
          id:row.id,
          title:row.title,
          summary:row.summary || '',
          objectives:[],
          rewards:{
            meso:Number(row.reward_meso || 0),
            crystals:Number(row.reward_crystals || 0),
            items:normalizeRewardItems(row.reward_items)
          },
          nextQuest:row.next_quest_id || null
        };
        nextQuestOrder.push(row.id);
      });
      (objectivesRes.data || []).forEach(row => {
        const quest = nextQuestDefs[row.quest_id];
        if(!quest) return;
        quest.objectives.push({
          key:row.objective_key,
          type:row.objective_type,
          npcId:row.npc_id || null,
          monster:row.monster_id || null,
          itemId:row.item_id || null,
          mapId:row.map_id || null,
          need:Math.max(1, Number(row.required_count || 1)),
          label:row.label || row.objective_key
        });
      });

      if(!Object.keys(nextItems).length || !Object.keys(nextMonsters).length || !Object.keys(nextMaps).length || !Object.keys(nextQuestDefs).length || !nextMaps.z01_m01){
        throw new Error('required master tables are empty or incomplete');
      }

      ITEM_DATA = nextItems;
      MONSTER_TEMPLATE = nextMonsters;
      DROP_TABLE = nextDrops;
      MAPS = nextMaps;
      NPCS_BY_MAP = nextNpcsByMap;
      QUEST_DEFS = nextQuestDefs;
      QUEST_ORDER = nextQuestOrder;
      GS.masterDataSource = 'supabase';
      GS.masterDataLoaded = true;
      GS.masterDataError = '';
      GS.masterDataStats = {
        items:Object.keys(ITEM_DATA).length,
        monsters:Object.keys(MONSTER_TEMPLATE).length,
        maps:Object.keys(MAPS).length,
        npcs:Object.values(NPCS_BY_MAP).reduce((sum, arr)=> sum + arr.length, 0),
        quests:QUEST_ORDER.length
      };
      console.info('master data loaded from supabase', GS.masterDataStats);
      return { ok:true, source:'supabase', stats:GS.masterDataStats };
    }

    let currentMap = null;
    let monsters = [];

    function qs(id){ return document.getElementById(id); }
    function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }
    function rand(a,b){ return Math.random()*(b-a)+a; }
    function irand(a,b){ return Math.floor(rand(a,b+1)); }
    function deepClone(v){ return JSON.parse(JSON.stringify(v)); }
    function normalizeProgress(v){
      const raw = typeof v === 'string' ? safeParseJSON(v, {}) : (v || {});
      const base = createDefaultProgress();
      const out = {
        version:Math.max(SAVE_SCHEMA_VERSION, Number(raw.version || SAVE_SCHEMA_VERSION)),
        quests:raw.quests && typeof raw.quests === 'object' ? raw.quests : {},
        dialogue:raw.dialogue && typeof raw.dialogue === 'object' ? raw.dialogue : {},
        kills:raw.kills && typeof raw.kills === 'object' ? raw.kills : {},
        visitedMaps:raw.visitedMaps && typeof raw.visitedMaps === 'object' ? raw.visitedMaps : {},
        flags:raw.flags && typeof raw.flags === 'object' ? raw.flags : {}
      };
      QUEST_ORDER.forEach(id=>{
        const q = out.quests[id] && typeof out.quests[id] === 'object' ? out.quests[id] : createDefaultQuestState();
        q.objectives = q.objectives && typeof q.objectives === 'object' ? q.objectives : {};
        out.quests[id] = q;
      });
      return { ...base, ...out };
    }
    function ensureQuestState(id){
      P.progress = normalizeProgress(P.progress);
      if(!P.progress.quests[id]) P.progress.quests[id] = createDefaultQuestState();
      if(!P.progress.quests[id].objectives) P.progress.quests[id].objectives = {};
      return P.progress.quests[id];
    }
    function getQuestProgressValue(questId, objective){
      const quest = ensureQuestState(questId);
      const raw = Number(quest.objectives[objective.key] || 0);
      return clamp(raw, 0, objective.need || 1);
    }
    function getItemCount(itemId){
      return P.inventory.filter(x=>x.itemId === itemId).reduce((sum,x)=>sum + Number(x.qty || 0), 0);
    }
    function getQuestObjectiveResolvedValue(objective, current=0){
      if(objective.type === 'killMonster') return Math.max(current, Number(P.progress.kills[objective.monster] || 0));
      if(objective.type === 'collectItem') return getItemCount(objective.itemId);
      if(objective.type === 'visitMap') return P.progress.visitedMaps[objective.mapId] ? 1 : current;
      if(objective.type === 'talkNpc') return P.progress.dialogue[objective.npcId] ? 1 : current;
      return current;
    }
    function maybeCompleteQuest(questId){
      const def = QUEST_DEFS[questId];
      const quest = ensureQuestState(questId);
      if(!def || !quest.started || quest.completed) return false;
      const done = def.objectives.every(obj=> getQuestProgressValue(questId, obj) >= (obj.need || 1));
      if(!done) return false;
      quest.completed = true;
      quest.completedAt = Date.now();
      if(!quest.rewarded){
        const rewards = def.rewards || {};
        if(rewards.meso) P.meso += rewards.meso;
        if(rewards.crystals) P.crystals += rewards.crystals;
        (rewards.items || []).forEach(it=> addItemToInventory(it.itemId, it.qty || 1));
        quest.rewarded = true;
      }
      GS.questToast = `QUEST CLEAR: ${def.title}`;
      GS.questToastUntil = performance.now() + 2600;
      pushChatMessage('SYSTEM', `${def.title} を達成した。`, 'system');
      if(def.nextQuest) startQuest(def.nextQuest, true);
      savePlayerToLocal();
      return true;
    }
    function refreshQuestProgress(questId){
      const def = QUEST_DEFS[questId];
      const quest = ensureQuestState(questId);
      if(!def || !quest.started || quest.completed) return false;
      let changed = false;
      def.objectives.forEach(obj=>{
        const now = getQuestProgressValue(questId, obj);
        const resolved = clamp(getQuestObjectiveResolvedValue(obj, now), 0, obj.need || 1);
        if(resolved !== now){ quest.objectives[obj.key] = resolved; changed = true; }
      });
      if(changed) maybeCompleteQuest(questId);
      return changed;
    }
    function refreshAllQuestProgress(){
      QUEST_ORDER.forEach(id=> refreshQuestProgress(id));
    }
    function startQuest(id, silent=false){
      const def = QUEST_DEFS[id];
      if(!def) return;
      const quest = ensureQuestState(id);
      if(!quest.started){
        quest.started = true;
        quest.startedAt = Date.now();
        def.objectives.forEach(obj=>{ if(typeof quest.objectives[obj.key] !== 'number') quest.objectives[obj.key] = 0; });
        refreshQuestProgress(id);
        if(!silent){
          GS.questToast = `NEW QUEST: ${def.title}`;
          GS.questToastUntil = performance.now() + 2600;
          pushChatMessage('SYSTEM', `${def.title} が追加された。`, 'system');
        }
      }
      if(!GS.selectedQuestId || !ensureQuestState(GS.selectedQuestId).started || ensureQuestState(GS.selectedQuestId).completed) GS.selectedQuestId = id;
    }
    function initProgressionScaffold(){
      P.progress = normalizeProgress(P.progress);
      if(!P.progress.flags.tutorialStarted){
        P.progress.flags.tutorialStarted = true;
        startQuest('onboarding', true);
      }else{
        QUEST_ORDER.forEach(id=>{ if(ensureQuestState(id).started) refreshQuestProgress(id); });
      }
      if(!GS.selectedQuestId){
        GS.selectedQuestId = QUEST_ORDER.find(id=>{ const q = ensureQuestState(id); return q.started && !q.completed; }) || QUEST_ORDER[0];
      }
      P.progress.visitedMaps[P.map_id || 'z01_m01'] = true;
      refreshAllQuestProgress();
    }
    function advanceQuestObjective(type, target, amount=1){
      let changed = false;
      QUEST_ORDER.forEach(id=>{
        const def = QUEST_DEFS[id];
        const quest = ensureQuestState(id);
        if(!def || !quest.started || quest.completed) return;
        def.objectives.forEach(obj=>{
          const matches = (
            (type === 'talkNpc' && obj.type === 'talkNpc' && obj.npcId === target) ||
            (type === 'killMonster' && obj.type === 'killMonster' && obj.monster === target) ||
            (type === 'visitMap' && obj.type === 'visitMap' && obj.mapId === target) ||
            (type === 'collectItem' && obj.type === 'collectItem' && obj.itemId === target)
          );
          if(!matches) return;
          const next = clamp((Number(quest.objectives[obj.key] || 0)) + amount, 0, obj.need || 1);
          if(next !== Number(quest.objectives[obj.key] || 0)){
            quest.objectives[obj.key] = next;
            changed = true;
            GS.questToast = `${def.title}: ${obj.label} ${next}/${obj.need || 1}`;
            GS.questToastUntil = performance.now() + 2000;
          }
        });
        maybeCompleteQuest(id);
      });
      if(changed) savePlayerToLocal();
    }
    function getTrackedQuestId(){
      if(GS.selectedQuestId){
        const selected = ensureQuestState(GS.selectedQuestId);
        if(selected.started && !selected.completed) return GS.selectedQuestId;
      }
      return QUEST_ORDER.find(id=>{ const q = ensureQuestState(id); return q.started && !q.completed; }) || '';
    }
    function getTrackedQuestData(){
      const id = getTrackedQuestId();
      return id ? { id, def:QUEST_DEFS[id], state:ensureQuestState(id) } : null;
    }
    function getCurrentMapNpcs(){
      return NPCS_BY_MAP[P.map_id] || [];
    }
    function getNearbyNpc(maxDist=62){
      const px = P.pos_x + P.w * 0.5;
      const py = P.pos_y + P.h * 0.5;
      return getCurrentMapNpcs().find(npc=> Math.abs((npc.x + npc.w * 0.5) - px) < maxDist && Math.abs((npc.y + npc.h * 0.5) - py) < 74);
    }
    function getNpcDialogue(npc){
      const onboarding = ensureQuestState('onboarding');
      const frontier = ensureQuestState('frontier');
      if(npc.id === 'guide_lumi'){
        if(!onboarding.started) return 'まずはこの周辺で操作に慣れましょう。話しかけ、狩り、拾得が冒険の基本です。';
        if(!onboarding.completed) return 'スライムを倒しつつ、赤ポーションを確保してみてください。';
        if(!frontier.started) return '準備は整いました。右側のポータルから古木の丘へ進みましょう。';
        return '順調です。この先はクエスト・NPC・探索イベントを追加しやすい構造にしてあります。';
      }
      if(npc.id === 'hunter_ren'){
        if(!frontier.started) return 'ここから先は偵察区域です。ルミの案内を終えてから来ると安全です。';
        if(!frontier.completed) return '廃坑入口まで到達できれば、探索イベントの土台は完成です。';
        return '次は討伐依頼や採集依頼を増やせます。土台は整っています。';
      }
      if(npc.id === 'miner_dan'){
        return frontier.completed ? '坑道イベントや採集、ギミックをここから拡張できます。' : 'ここまで来られたなら探索導線は完成間近です。';
      }
      return 'こんにちは。';
    }
    function interactNearestNpc(){
      if(GS.scene !== 'play' || GS.inventoryOpen) return;
      const npc = getNearbyNpc();
      if(!npc){
        GS.interactionText = '近くに話せるNPCがいません';
        GS.interactionUntil = performance.now() + 1200;
        return;
      }
      P.progress.dialogue[npc.id] = 1;
      if(npc.id === 'guide_lumi') startQuest('onboarding', true);
      if(npc.id === 'hunter_ren' && ensureQuestState('onboarding').completed) startQuest('frontier', true);
      advanceQuestObjective('talkNpc', npc.id, 1);
      refreshAllQuestProgress();
      const text = getNpcDialogue(npc);
      GS.npcDialogue = { speaker:npc.name, title:npc.title, text, until:performance.now() + 4200 };
      GS.noticeText = `${npc.name}: ${text}`;
      GS.noticeOk = true;
      GS.noticeUntil = performance.now() + 2200;
      pushChatMessage('SYSTEM', `${npc.name}: ${text}`, 'system');
      savePlayerToLocal();
    }

    function localSaveData(){
      return {
        id:P.id,login_id:P.login_id,password_hash:P.password_hash,name:P.name,job:P.job,
        level:P.level,exp:P.exp,hp:P.hp,max_hp:P.max_hp,mp:P.mp,max_mp:P.max_mp,atk:P.atk,def:P.def,
        meso:P.meso,crystals:P.crystals,map_id:P.map_id,pos_x:P.pos_x,pos_y:P.pos_y,reborn_count:P.reborn_count,
        inventory:P.inventory,equipped:P.equipped,progress:P.progress,save_version:SAVE_SCHEMA_VERSION,last_saved_at:Date.now()
      };
    }

    function safeParseJSON(raw, fallback){
      try{ return JSON.parse(raw); }catch(_){ return fallback; }
    }
    function normalizeInventory(v){
      if(!Array.isArray(v)) return [];
      return v.filter(x=>x&&x.itemId&&ITEM_DATA[x.itemId]&&Number(x.qty||0)>0).map(x=>({itemId:x.itemId,qty:Math.max(1,Math.floor(Number(x.qty)||1))}));
    }
    function normalizeEquipped(v){
      const base={weapon:null,head:null,body:null,accessory:null};
      if(!v||typeof v!=='object') return base;
      for(const k of Object.keys(base)) base[k]=v[k]&&ITEM_DATA[v[k]]?v[k]:null;
      return base;
    }

    function applyPlayerData(d){
      if(!d) return;
      P.id = d.id || P.id || crypto.randomUUID();
      P.login_id = d.login_id || P.login_id || '';
      P.password_hash = d.password_hash || P.password_hash || '';
      P.name = d.name || '';
      P.job = d.job || 'Novice';
      P.level = Math.max(1, Number(d.level||1));
      P.exp = Math.max(0, Number(d.exp||0));
      P.max_hp = Math.max(1, Number(d.max_hp||100));
      P.hp = clamp(Number(d.hp||P.max_hp), 0, P.max_hp);
      P.max_mp = Math.max(0, Number(d.max_mp||30));
      P.mp = clamp(Number(d.mp||P.max_mp), 0, P.max_mp);
      P.atk = Math.max(0, Number(d.atk||10));
      P.def = Math.max(0, Number(d.def||5));
      P.meso = Math.max(0, Number(d.meso||0));
      P.crystals = Math.max(0, Number(d.crystals||0));
      P.map_id = d.map_id || 'z01_m01';
      P.pos_x = Number(d.pos_x ?? 180);
      P.pos_y = Number(d.pos_y ?? 390);
      P.reborn_count = Math.max(0, Number(d.reborn_count||0));
      P.inventory = normalizeInventory(typeof d.inventory==='string' ? safeParseJSON(d.inventory||'[]', []) : d.inventory);
      P.equipped = normalizeEquipped(typeof d.equipped==='string' ? safeParseJSON(d.equipped||'{}', {}) : d.equipped);
      P.progress = normalizeProgress(typeof d.progress==='string' ? safeParseJSON(d.progress||'{}', {}) : d.progress);
      P.save_version = Math.max(SAVE_SCHEMA_VERSION, Number(d.save_version || SAVE_SCHEMA_VERSION));
      if(P.inventory.length===0) P.inventory=[{itemId:'rusty_sword',qty:1},{itemId:'red_potion',qty:3}];
      P.vx=0; P.vy=0; P.onGround=false; P.attackCd=0; P.invuln=0; P.attackFlash=0;
      P.skillCooldowns = {};
      P.buffs = {atkUntil:0,defUntil:0,speedUntil:0,atkAmount:0,defAmount:0,speedFactor:1};
      initProgressionScaffold();
    }

    function savePlayerToLocal(){
      localStorage.setItem('altera_mmo_save', JSON.stringify(localSaveData()));
      updateLocalSavePreview();
    }
    function loadPlayerFromLocal(){
      try{
        const raw = localStorage.getItem('altera_mmo_save');
        if(!raw) return false;
        applyPlayerData(JSON.parse(raw));
        GS.localLoaded = true;
        return true;
      }catch(e){ console.warn(e); return false; }
    }

    function expToNext(level){ return 18 + (level-1)*16; }

    function getEquippedItems(){
      return Object.values(P.equipped).filter(Boolean).map(id=>ITEM_DATA[id]).filter(Boolean);
    }
    function getEquipBonus(){
      return getEquippedItems().reduce((a,it)=>{
        a.atk += Number(it.atk||0);
        a.def += Number(it.def||0);
        a.maxHp += Number(it.maxHp||0);
        a.maxMp += Number(it.maxMp||0);
        return a;
      },{atk:0,def:0,maxHp:0,maxMp:0});
    }
    function getActiveSkills(){ return SKILLS_BY_JOB[P.job] || SKILLS_BY_JOB.Novice; }
    function skillCooldownLeft(skill){ return Math.max(0, Math.ceil(((P.skillCooldowns[skill.id] || 0) - performance.now()) / 1000)); }
    function getBuffBonus(){
      const now = performance.now();
      return {
        atk: now < (P.buffs.atkUntil || 0) ? (P.buffs.atkAmount || 0) : 0,
        def: now < (P.buffs.defUntil || 0) ? (P.buffs.defAmount || 0) : 0,
        speed: now < (P.buffs.speedUntil || 0) ? (P.buffs.speedFactor || 1) : 1
      };
    }
    function getTotalAtk(){ return P.atk + getEquipBonus().atk + getBuffBonus().atk; }
    function getTotalDef(){ return P.def + getEquipBonus().def + getBuffBonus().def; }
    function getTotalMaxHp(){ return P.max_hp + getEquipBonus().maxHp; }
    function getTotalMaxMp(){ return P.max_mp + getEquipBonus().maxMp; }

    function addItemToInventory(itemId, qty=1){
      const found = P.inventory.find(x=>x.itemId===itemId);
      if(found) found.qty += qty;
      else P.inventory.push({itemId, qty});
      savePlayerToLocal();
      renderInventoryUI();
    }
    function removeItemFromInventory(index, qty=1){
      const it = P.inventory[index];
      if(!it) return;
      it.qty -= qty;
      if(it.qty <= 0) P.inventory.splice(index,1);
      GS.selectedInvIndex = clamp(GS.selectedInvIndex, 0, Math.max(0,P.inventory.length-1));
      savePlayerToLocal();
      renderInventoryUI();
    }
    function slotForType(type){
      if(type==='weapon') return 'weapon';
      if(type==='head') return 'head';
      if(type==='body') return 'body';
      if(type==='accessory') return 'accessory';
      return null;
    }
    function equipItemByIndex(index){
      const ent = P.inventory[index]; if(!ent) return;
      const item = ITEM_DATA[ent.itemId]; if(!item) return;
      const slot = slotForType(item.type);
      if(!slot) return liMsg('このアイテムは装備できません。');
      const prev = P.equipped[slot];
      P.equipped[slot] = item.id;
      removeItemFromInventory(index,1);
      if(prev) addItemToInventory(prev,1);
      P.hp = clamp(P.hp, 0, getTotalMaxHp());
      P.mp = clamp(P.mp, 0, getTotalMaxMp());
      liMsg(item.name + ' を装備しました。', true);
      renderInventoryUI();
      savePlayer();
    }
    function unequipSlot(slot){
      const id = P.equipped[slot]; if(!id) return;
      P.equipped[slot] = null;
      addItemToInventory(id,1);
      P.hp = clamp(P.hp, 0, getTotalMaxHp());
      P.mp = clamp(P.mp, 0, getTotalMaxMp());
      renderInventoryUI();
      savePlayer();
    }
    function useItemByIndex(index){
      const ent = P.inventory[index]; if(!ent) return;
      const item = ITEM_DATA[ent.itemId]; if(!item) return;
      if(item.type !== 'consumable') return liMsg('消耗品ではありません。');
      let used = false;
      if(item.healHp){ P.hp = clamp(P.hp + item.healHp, 0, getTotalMaxHp()); used = true; }
      if(item.healMp){ P.mp = clamp(P.mp + item.healMp, 0, getTotalMaxMp()); used = true; }
      if(used){ removeItemFromInventory(index,1); liMsg(item.name + ' を使用しました。', true); savePlayer(); }
    }
    function dropItemByIndex(index){
      const ent = P.inventory[index]; if(!ent) return;
      removeItemFromInventory(index,1);
      GS.worldDrops.push({itemId:ent.itemId,qty:1,x:P.pos_x + P.facing*24,y:P.pos_y - 8,vx:P.facing*1.5,vy:-2,life:1800});
      liMsg('アイテムを捨てました。', true);
      savePlayer();
    }

    function liMsg(t, ok=false){
      const ids=['loginMsg','createMsg'];
      ids.forEach(id=>{ const el=qs(id); if(el){ el.textContent=t||''; el.className='msg'+(ok?' ok':''); } });
      GS.noticeText = t || '';
      GS.noticeOk = !!ok;
      GS.noticeUntil = performance.now() + (t ? 2400 : 0);
      setTimeout(()=>{ ids.forEach(id=>{ const el=qs(id); if(el && el.textContent===t) el.textContent=''; }); }, 2400);
    }

    async function sha256(text){
      const bytes = new TextEncoder().encode(text);
      const hash = await crypto.subtle.digest('SHA-256', bytes);
      return [...new Uint8Array(hash)].map(x=>x.toString(16).padStart(2,'0')).join('');
    }

    async function initSB(){
      if(sb) return sb;
      const config = getRuntimeSupabaseConfig();
      if(!config) {
        GS.chatOnline = false;
        GS.presenceOnline = false;
        setOnlineError('Supabase URL / ANON KEY が未設定です');
        throw new Error('Supabase URL / KEY が未設定です');
      }
      if(!window.supabase) throw new Error('Supabase CDN を読み込めません');
      sb = window.supabase.createClient(config.url, config.key, {
        realtime:{ params:{ eventsPerSecond: 8 } }
      });
      setOnlineError('');
      return sb;
    }

    async function loadPlayerFromDB(loginId, passwordHash){
      const client = await initSB();
      const { data, error } = await client.from('mmo_players')
        .select('*')
        .eq('login_id', loginId)
        .eq('password_hash', passwordHash)
        .maybeSingle();
      if(error) throw error;
      if(!data) return null;
      applyPlayerData(data);
      savePlayerToLocal();
      return data;
    }

    async function doLogin(){
      if(GS.isSubmitting) return;
      setSubmitBusy(true);
      try{
        if(!ensureMasterDataReady()) return;

        const pw = qs('loginPw').value;

        hideLoginUI();
        if(!P.name) showCreateUI();
        else startGame();
      }catch(err){
        console.error(err);
        liMsg('サーバーに接続できません');
      }finally{
        setSubmitBusy(false);
      }
    }

        const client = await initSB();
        const payload = {
          id:P.id, login_id:P.login_id, password_hash:P.password_hash,
          name:P.name||'', job:P.job||'Novice', level:P.level, exp:P.exp,

    function isSolidAt(x,y,w,h){
      if(!currentMap) return false;
      return currentMap.platforms.some(p=> x + w > p.x && x < p.x + p.w && y + h > p.y && y < p.y + p.h);
    }

    function resolvePlayerPlatforms(){
      P.onGround = false;
      for(const p of currentMap.platforms){
        if(P.pos_x + P.w > p.x && P.pos_x < p.x + p.w){
          const prevBottom = P.pos_y + P.h - P.vy;
          const currBottom = P.pos_y + P.h;
          if(prevBottom <= p.y + 8 && currBottom >= p.y && P.vy >= 0){
            P.pos_y = p.y - P.h;
            P.vy = 0;
            P.onGround = true;
          }
        }
      }
      if(P.pos_y + P.h >= currentMap.ground){
        P.pos_y = currentMap.ground - P.h;
        P.vy = 0;
        P.onGround = true;
      }
    }

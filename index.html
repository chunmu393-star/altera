<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>ALTERA MMO MVP</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <style>
    :root{
      --bg:#05060c;
      --panel:rgba(13,13,26,.96);
      --line:#1e2142;
      --gold:#ffcc00;
      --blue:#4a8dff;
      --green:#55dd88;
      --red:#ff5a68;
      --txt:#d6d9e8;
      --muted:#7d8198;
    }

    html,body{
      margin:0;
      padding:0;
      width:100%;
      height:100%;
      background:#000;
      overflow:hidden;
      font-family:'Courier New', monospace;
      touch-action:none;
      -webkit-tap-highlight-color:transparent;
      user-select:none;
      -webkit-user-select:none;
    }

    body{
      display:flex;
      justify-content:center;
      align-items:center;
    }

    #gameCanvas{
      display:block;
      image-rendering:pixelated;
      max-width:100vw;
      max-height:100vh;
      background:#07070f;
      touch-action:none;
      box-shadow:0 0 24px rgba(0,0,0,.5);
    }

    #rotateMsg{
      display:none;
      position:fixed;
      inset:0;
      background:#000;
      color:var(--gold);
      font-size:20px;
      text-align:center;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      z-index:9999;
      gap:12px;
    }

    @media (orientation: portrait){
      #rotateMsg{ display:flex; }
    }

    .ui-overlay{
      position:fixed;
      inset:0;
      z-index:1000;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(5,6,12,.82);
      backdrop-filter:blur(4px);
    }

    .ui-card{
      width:min(360px, calc(100vw - 32px));
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:12px;
      padding:24px;
      color:var(--txt);
      box-sizing:border-box;
      box-shadow:0 20px 50px rgba(0,0,0,.45);
    }

    .title-logo{
      text-align:center;
      color:var(--gold);
      font-size:28px;
      font-weight:bold;
      letter-spacing:4px;
      margin-bottom:4px;
    }

    .subtitle-logo{
      text-align:center;
      color:#4d5168;
      font-size:11px;
      margin-bottom:20px;
    }

    .tabs{
      display:flex;
      border-bottom:1px solid var(--line);
      margin-bottom:18px;
    }

    .tab-btn{
      flex:1;
      padding:9px;
      background:none;
      border:none;
      color:#666;
      font-family:inherit;
      font-size:12px;
      cursor:pointer;
      border-bottom:2px solid transparent;
    }

    .tab-btn.active{
      color:var(--blue);
      border-bottom-color:var(--blue);
    }

    .field-label{
      color:#747a98;
      font-size:10px;
      margin-bottom:5px;
    }

    .field-wrap{
      margin-bottom:12px;
    }

    .input{
      width:100%;
      box-sizing:border-box;
      background:#111321;
      border:1px solid var(--line);
      border-radius:6px;
      color:#d5daf2;
      padding:11px 10px;
      font-family:inherit;
      font-size:13px;
      outline:none;
    }

    .input:focus{
      border-color:#3a6ae0;
      box-shadow:0 0 0 2px rgba(74,141,255,.15);
    }

    .msg{
      min-height:18px;
      font-size:10px;
      color:var(--red);
      margin-bottom:12px;
    }

    .primary-btn,.secondary-btn{
      width:100%;
      padding:12px;
      border:none;
      border-radius:6px;
      font-family:inherit;
      font-size:12px;
      font-weight:bold;
      cursor:pointer;
    }

    .primary-btn{
      background:var(--blue);
      color:#09101e;
    }

    .secondary-btn{
      background:#1a1f36;
      color:#d4d8eb;
      border:1px solid var(--line);
    }

    .btn-row{
      display:flex;
      gap:10px;
      margin-top:8px;
    }

    .small-note{
      color:#6f748a;
      font-size:10px;
      text-align:center;
      margin-top:10px;
      line-height:1.5;
    }

    .touch-btn{
      position:fixed;
      width:64px;
      height:64px;
      border-radius:50%;
      display:none;
      align-items:center;
      justify-content:center;
      z-index:600;
      color:#fff;
      font-size:12px;
      font-weight:bold;
      font-family:inherit;
      touch-action:none;
      border:2px solid rgba(255,255,255,.18);
      box-sizing:border-box;
      background:rgba(255,255,255,.08);
      backdrop-filter:blur(3px);
    }

    .touch-btn.show{ display:flex; }

    .touch-btn.attack{
      right:22px;
      bottom:28px;
      background:rgba(255,78,97,.22);
      border-color:rgba(255,78,97,.45);
    }

    .touch-btn.jump{
      right:102px;
      bottom:108px;
      background:rgba(72,136,255,.22);
      border-color:rgba(72,136,255,.45);
    }

    .joy-base{
      position:fixed;
      left:20px;
      bottom:20px;
      width:118px;
      height:118px;
      border-radius:50%;
      display:none;
      z-index:600;
      touch-action:none;
      background:rgba(255,255,255,.07);
      border:2px solid rgba(255,255,255,.15);
      box-sizing:border-box;
      backdrop-filter:blur(3px);
    }

    .joy-base.show{ display:block; }

    .joy-stick{
      position:absolute;
      width:46px;
      height:46px;
      border-radius:50%;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      background:rgba(255,255,255,.30);
      pointer-events:none;
    }
  </style>
</head>

    function initSB() {
      if (sb) return sb;

    function initCanvas() {

      CTX = CVS.getContext('2d');
      CVS.width = GAME_W;
      CVS.height = GAME_H;
      resizeCanvas();
      return true;
    }

    function resizeCanvas() {
      if (!CVS) return;
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      const scale = Math.min(vw / GAME_W, vh / GAME_H);
      const dw = Math.floor(GAME_W * scale);
      const dh = Math.floor(GAME_H * scale);
      CVS.style.width = dw + 'px';
      CVS.style.height = dh + 'px';
      CVS.style.position = 'fixed';
      CVS.style.left = Math.floor((vw - dw) / 2) + 'px';
      CVS.style.top = Math.floor((vh - dh) / 2) + 'px';
      window._csScale = scale;
    }

    window.addEventListener('resize', resizeCanvas);
    window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 200));

    // -----------------------------------------
    // Utility
    // -----------------------------------------
    function clamp(v, a, b) {
      return Math.max(a, Math.min(b, v));
    }

    function rectsOverlap(a, b) {
      return (
        a.x < b.x + b.w &&
        a.x + a.w > b.x &&
        a.y < b.y + b.h &&
        a.y + a.h > b.y
      );
    }

    function nowMs() {
      return performance.now();
    }

    function needExp(level) {
      return Math.floor(20 + level * 14 + level * level * 4);
    }

    function addFloatText(x, y, text, color = '#ffffff') {
      GS.hitTexts.push({ x, y, text, color, life:42 });

    function safeJsonParse(str, fallback) {
      try { return JSON.parse(str); }
      catch { return fallback; }
    }

    // -----------------------------------------
    // Local Save
    // -----------------------------------------
    function savePlayerToLocal() {
      localStorage.setItem('altera_pid', P.id || '');
      localStorage.setItem('altera_login_id', P.loginId || '');
      localStorage.setItem('altera_name', P.name || '');
      localStorage.setItem('altera_job', P.job || 'Novice');
      localStorage.setItem('altera_lv', String(P.level || 1));
      localStorage.setItem('altera_exp', String(P.exp || 0));
      localStorage.setItem('altera_hp', String(P.hp || 100));
      localStorage.setItem('altera_mhp', String(P.maxHp || 100));
      localStorage.setItem('altera_mp', String(P.mp || 50));
      localStorage.setItem('altera_mmp', String(P.maxMp || 50));
      localStorage.setItem('altera_atk', String(P.atk || 10));
      localStorage.setItem('altera_def', String(P.def || 5));
      localStorage.setItem('altera_meso', String(P.meso || 0));
      localStorage.setItem('altera_crystals', String(P.crystals || 0));
      localStorage.setItem('altera_map', P.mapId || 'z01_m01');
      localStorage.setItem('altera_x', String(P.x ?? 200));
      localStorage.setItem('altera_y', String(P.y ?? 400));
      localStorage.setItem('altera_reborn', String(P.rebornCount || 0));
      localStorage.setItem('altera_inventory', JSON.stringify(P.inventory || []));
      localStorage.setItem('altera_equipped', JSON.stringify(P.equipped || {}));
    }

    function loadPlayerFromLocal() {
      P.id = localStorage.getItem('altera_pid') || '';
      P.loginId = localStorage.getItem('altera_login_id') || '';
      P.name = localStorage.getItem('altera_name') || '';
      P.job = localStorage.getItem('altera_job') || 'Novice';
      P.level = parseInt(localStorage.getItem('altera_lv') || '1', 10);
      P.exp = parseInt(localStorage.getItem('altera_exp') || '0', 10);
      P.hp = parseInt(localStorage.getItem('altera_hp') || '100', 10);
      P.maxHp = parseInt(localStorage.getItem('altera_mhp') || '100', 10);
      P.mp = parseInt(localStorage.getItem('altera_mp') || '50', 10);
      P.maxMp = parseInt(localStorage.getItem('altera_mmp') || '50', 10);
      P.atk = parseInt(localStorage.getItem('altera_atk') || '10', 10);
      P.def = parseInt(localStorage.getItem('altera_def') || '5', 10);
      P.meso = parseInt(localStorage.getItem('altera_meso') || '0', 10);
      P.crystals = parseInt(localStorage.getItem('altera_crystals') || '0', 10);
      P.mapId = localStorage.getItem('altera_map') || 'z01_m01';
      P.x = parseInt(localStorage.getItem('altera_x') || '200', 10);
      P.y = parseInt(localStorage.getItem('altera_y') || '400', 10);
      P.rebornCount = parseInt(localStorage.getItem('altera_reborn') || '0', 10);
      P.inventory = safeJsonParse(localStorage.getItem('altera_inventory') || '[]', []);
      P.equipped = safeJsonParse(localStorage.getItem('altera_equipped') || '{}', {});
    }

    async function sha256(str) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
    }

    // -----------------------------------------
    // Login UI
    // -----------------------------------------
    let loginEl = null;
    let _liMode = 'login';

    function liMsg(msg, col = '#ff5a68') {
      const el = document.getElementById('liMsg');
      if (el) {
        el.textContent = msg;
        el.style.color = col;
      }
    }

    function liLoad(v) {
      const b = document.getElementById('liBtn');
      if (b) {
        b.disabled = !!v;
        b.style.opacity = v ? '0.5' : '1';
      }
    }

    function swTab(mode) {
      _liMode = mode;
      const isLogin = mode === 'login';
      const tabL = document.getElementById('tabL');
      const tabR = document.getElementById('tabR');
      const liBtn = document.getElementById('liBtn');
      const liMsgEl = document.getElementById('liMsg');
      const liPw = document.getElementById('liPw');

      tabL?.classList.toggle('active', isLogin);
      tabR?.classList.toggle('active', !isLogin);
      if (liBtn) liBtn.textContent = isLogin ? '🔑 ログイン' : '📝 登録してはじめる';
      if (liMsgEl) liMsgEl.textContent = '';
      if (liPw) liPw.autocomplete = isLogin ? 'current-password' : 'new-password';
    }

    function hideLoginUI() {
      loginEl?.remove();
      loginEl = null;
      document.getElementById('loginOverlay')?.remove();
    }

    function showLoginUI() {
      if (document.getElementById('loginOverlay')) return;

      loginEl = document.createElement('div');
      loginEl.id = 'loginOverlay';
      loginEl.className = 'ui-overlay';

      loginEl.innerHTML = `
        <div class="ui-card">
          <div class="title-logo">⚔ ALTERA</div>
          <div class="subtitle-logo">MASSIVELY MULTIPLAYER ONLINE</div>

          <div class="tabs">
            <button id="tabL" class="tab-btn active">ログイン</button>
            <button id="tabR" class="tab-btn">新規登録</button>
          </div>

          <div class="field-wrap">
            <div class="field-label">プレイヤーID（英数字・アンダースコア・3文字以上）</div>
            <input id="liId" class="input" maxlength="20" placeholder="your_id" autocomplete="username">
          </div>

          <div class="field-wrap">
            <div class="field-label">パスワード（6文字以上）</div>
            <input id="liPw" class="input" type="password" maxlength="32" placeholder="password" autocomplete="current-password">
          </div>

          <div id="liMsg" class="msg"></div>

          <button id="liBtn" class="primary-btn">🔑 ログイン</button>

          <div class="small-note">
            初回は「新規登録」→「キャラ名入力」→ゲーム開始です
          </div>
        </div>
      `;

      document.body.appendChild(loginEl);

      const liId = document.getElementById('liId');
      const liPw = document.getElementById('liPw');
      const tabL = document.getElementById('tabL');
      const tabR = document.getElementById('tabR');
      const liBtn = document.getElementById('liBtn');

      liId?.addEventListener('input', function () {
        this.value = this.value.replace(/[^a-zA-Z0-9_]/g, '').toLowerCase();
      });

      liPw?.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') doLiAction();
      });

      tabL?.addEventListener('click', () => swTab('login'));
      tabR?.addEventListener('click', () => swTab('reg'));
      liBtn?.addEventListener('click', doLiAction);

      setTimeout(() => liId?.focus(), 100);
    }

    function doLiAction() {
      if (_liMode === 'login') doLogin();
      else doRegister();
    }

    async function doRegister() {
      if (!initSB()) {
        liMsg('サーバーに接続できません');
        return;
      }

      const id = (document.getElementById('liId')?.value || '').trim().toLowerCase();
      const pw = document.getElementById('liPw')?.value || '';

      if (!id || id.length < 3) {
        liMsg('IDは3文字以上にしてください');
        return;
      }

      if (!/^[a-z0-9_]+$/.test(id)) {
        liMsg('IDは英数字とアンダースコアのみです');
        return;
      }

      if (!pw || pw.length < 6) {
        liMsg('パスワードは6文字以上にしてください');
        return;
      }

      liLoad(true);
      liMsg('登録中...', '#8892b0');

      try {
        const { data:ex, error:exErr } = await sb
          .from('mmo_players')
          .select('login_id')
          .eq('login_id', id)
          .maybeSingle();

        if (exErr) {
          liMsg('確認に失敗: ' + exErr.message);
          liLoad(false);
          return;
        }

        if (ex) {
          liMsg('このIDはすでに使われています');
          liLoad(false);
          return;
        }

        const hash = await sha256(id + ':' + pw);
        const newId = crypto.randomUUID();

        P.id = newId;
        P.loginId = id;
        P.name = '';
        P.job = 'Novice';
        P.level = 1;
        P.exp = 0;
        P.hp = 100;
        P.maxHp = 100;
        P.mp = 50;
        P.maxMp = 50;
        P.atk = 10;
        P.def = 5;
        P.meso = 0;
        P.crystals = 0;
        P.mapId = 'z01_m01';
        P.x = 200;
        P.y = 400;
        P.inventory = [];
        P.equipped = {};
        P.rebornCount = 0;
        P._pendingLogin = {
          login_id:id,
          password_hash:hash,
        };

        savePlayerToLocal();

        liMsg('登録完了！キャラクター名を決めてください', '#55dd88');

        setTimeout(() => {
          hideLoginUI();
          GS.scene = 'create';
          showNameInput();
        }, 450);
      } catch (e) {
        console.error(e);
        liMsg('エラー: ' + e.message);
      } finally {
        liLoad(false);
      }
    }

    async function doLogin() {
      if (!initSB()) {
        liMsg('サーバーに接続できません');
        return;
      }

      const id = (document.getElementById('liId')?.value || '').trim().toLowerCase();
      const pw = document.getElementById('liPw')?.value || '';

      if (!id) {
        liMsg('IDを入力してください');
        return;
      }

      if (!pw) {
        liMsg('パスワードを入力してください');
        return;
      }

      liLoad(true);
      liMsg('ログイン中...', '#8892b0');

      try {
        const hash = await sha256(id + ':' + pw);

        const { data, error } = await sb
          .from('mmo_players')
          .select('*')
          .eq('login_id', id)
          .maybeSingle();

        if (error) {
          liMsg('ログイン失敗: ' + error.message);
          liLoad(false);
          return;
        }

        if (!data) {
          liMsg('IDが見つかりません。新規登録してください');
          liLoad(false);
          return;
        }

        if (data.password_hash !== hash) {
          liMsg('パスワードが違います');
          liLoad(false);
          return;
        }

        await sb
          .from('mmo_players')
          .update({ last_login_at:new Date().toISOString() })
          .eq('id', data.id);

        liMsg('ログイン成功！', '#55dd88');
        await loadPlayerFromDB(data);
      } catch (e) {
        console.error(e);
        liMsg('エラー: ' + e.message);
        liLoad(false);
      }
    }

    async function loadPlayerFromDB(data) {
      P.id = data.id || '';
      P.loginId = data.login_id || '';
      P.name = data.name || '';
      P.job = data.job || 'Novice';
      P.level = data.level || 1;
      P.exp = data.exp || 0;
      P.hp = data.hp || data.max_hp || 100;
      P.maxHp = data.max_hp || 100;
      P.mp = data.mp || data.max_mp || 50;
      P.maxMp = data.max_mp || 50;
      P.atk = data.atk || 10;
      P.def = data.def || 5;
      P.meso = data.meso || 0;
      P.crystals = data.crystals || 0;
      P.mapId = data.map_id || 'z01_m01';
      P.x = data.pos_x ?? 200;
      P.y = data.pos_y ?? 400;
      P.rebornCount = data.reborn_count || 0;
      P.inventory = data.inventory ? safeJsonParse(data.inventory, []) : [];
      P.equipped = data.equipped ? safeJsonParse(data.equipped, {}) : {};
      P._pendingLogin = null;

      savePlayerToLocal();
      hideLoginUI();

      if (!P.name) {
        GS.scene = 'create';
        showNameInput();
        return;
      }

      GS.scene = 'play';
      initMobileUI();
      loadMap(P.mapId || 'z01_m01', P.x ?? 200, P.y ?? 400);
    }

    async function savePlayer() {
      savePlayerToLocal();
      if (!P.id) return;
      if (!initSB()) return;

      const payload = {
        id:P.id,
        name:P.name || '',
        job:P.job || 'Novice',
        level:P.level || 1,
        exp:P.exp || 0,
        hp:P.hp || 0,
        max_hp:P.maxHp || 100,
        mp:P.mp || 0,
        max_mp:P.maxMp || 50,
        atk:P.atk || 10,
        def:P.def || 5,
        meso:P.meso || 0,
        crystals:P.crystals || 0,
        map_id:P.mapId || 'z01_m01',
        pos_x:Math.floor(P.x ?? 200),
        pos_y:Math.floor(P.y ?? 400),
        reborn_count:P.rebornCount || 0,
        inventory:JSON.stringify(P.inventory || []),
        equipped:JSON.stringify(P.equipped || {}),
        updated_at:new Date().toISOString(),
      };

      try {
        if (P._pendingLogin && P._pendingLogin.login_id && P._pendingLogin.password_hash) {
          const insertPayload = {
            ...payload,
            login_id:P._pendingLogin.login_id,
            password_hash:P._pendingLogin.password_hash,
          };

          const { error } = await sb
            .from('mmo_players')
            .upsert(insertPayload, { onConflict:'id' });

          if (error) {
            console.error('savePlayer pending error:', error);
            return;
          }

          P.loginId = P._pendingLogin.login_id;
          P._pendingLogin = null;
          savePlayerToLocal();
          return;
        }

        const { data:ex, error:exErr } = await sb
          .from('mmo_players')
          .select('id')
          .eq('id', P.id)
          .maybeSingle();

        if (exErr) {
          console.error('save lookup error:', exErr);
          return;
        }

        if (!ex) {
          console.warn('player row not found; save skipped');
          return;
        }

        const { error } = await sb
          .from('mmo_players')
          .update(payload)
          .eq('id', P.id);

        if (error) console.error('save update error:', error);
      } catch (e) {
        console.error('save exception:', e);
      }
    }

    // -----------------------------------------
    // Touch UI
    // -----------------------------------------
    let joyBase = null;
    let joyStick = null;
    let attackBtn = null;
    let jumpBtn = null;
    let joyActive = false;
    let joyId = -1;
    let joyCX = 0;
    let joyCY = 0;

    function initMobileUI() {
      if (GS.mobileInited) return;
      if (!('ontouchstart' in window)) return;

      GS.mobileInited = true;

      joyBase = document.createElement('div');
      joyBase.className = 'joy-base show';

      joyStick = document.createElement('div');
      joyStick.className = 'joy-stick';
      joyBase.appendChild(joyStick);

      attackBtn = document.createElement('button');
      attackBtn.className = 'touch-btn attack show';
      attackBtn.textContent = '⚔ 攻';

      jumpBtn = document.createElement('button');
      jumpBtn.className = 'touch-btn jump show';
      jumpBtn.textContent = '↑ 跳';

      document.body.appendChild(joyBase);
      document.body.appendChild(attackBtn);
      document.body.appendChild(jumpBtn);

      joyBase.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const t = e.changedTouches[0];
        const r = joyBase.getBoundingClientRect();
        joyActive = true;
        joyId = t.identifier;
        joyCX = r.left + r.width / 2;
        joyCY = r.top + r.height / 2;
        updateJoy(t.clientX, t.clientY);
      }, { passive:false });

      document.addEventListener('touchmove', (e) => {
        if (!joyActive) return;
        for (const t of e.changedTouches) {
          if (t.identifier === joyId) {
            e.preventDefault();
            updateJoy(t.clientX, t.clientY);
            break;
          }
        }
      }, { passive:false });

      document.addEventListener('touchend', (e) => {
        for (const t of e.changedTouches) {
          if (t.identifier === joyId) {
            joyActive = false;
            joyId = -1;
            VK.left = false;
            VK.right = false;
            joyStick.style.transform = 'translate(-50%, -50%)';
            break;
          }
        }
      }, { passive:false });

      const bindTouchBtn = (key, btn, activeBg, normalBg) => {
        btn.addEventListener('touchstart', (e) => {
          e.preventDefault();
          VK[key] = true;
          btn.style.background = activeBg;
        }, { passive:false });

        btn.addEventListener('touchend', (e) => {
          e.preventDefault();
          VK[key] = false;
          btn.style.background = normalBg;
        }, { passive:false });

        btn.addEventListener('touchcancel', () => {
          VK[key] = false;
          btn.style.background = normalBg;
        });
      };

      bindTouchBtn('attack', attackBtn, 'rgba(255,78,97,.45)', 'rgba(255,78,97,.22)');
      bindTouchBtn('jump', jumpBtn, 'rgba(72,136,255,.45)', 'rgba(72,136,255,.22)');
    }

    function updateJoy(cx, cy) {
      const dx = cx - joyCX;
      const dy = cy - joyCY;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const maxR = 36;
      const r = Math.min(dist, maxR);
      const ang = Math.atan2(dy, dx);

      joyStick.style.transform =
        `translate(calc(-50% + ${Math.cos(ang) * r}px), calc(-50% + ${Math.sin(ang) * r}px))`;

      VK.left = dx < -14;
      VK.right = dx > 14;
    }

    // -----------------------------------------
    // World / Gameplay
    // -----------------------------------------
    function loadMap(mapId, x = 200, y = 400) {
      const map = MAPS[mapId];
      if (!map) return;

      GS.currentMap = map;
      P.mapId = mapId;
      P.x = x;
      P.y = y;
      P.vx = 0;
      P.vy = 0;
      GS.portalLockUntil = nowMs() + 600;

      MONSTERS = map.spawns.map((s, i) => {
        const base = MONSTER_DATA[s.type];
        return {
          id:`${mapId}_${s.type}_${i}_${Math.random().toString(36).slice(2,7)}`,
          type:s.type,
          name:base.name,
          x:s.x,
          y:s.y - base.h,
          w:base.w,
          h:base.h,
          hp:base.maxHp,
          maxHp:base.maxHp,
          atk:base.atk,
          def:base.def,
          exp:base.exp,
          meso:base.meso,
          speed:base.speed,
          color:base.color,
          facing:Math.random() < 0.5 ? -1 : 1,
          minX:s.minX,
          maxX:s.maxX,
          hitFlash:0,
          dead:false
        };
      });

      updateCamera();
    }

    function updateCamera() {
      if (!GS.currentMap) return;
      GS.cameraX = clamp(P.x + P.w / 2 - GAME_W / 2, 0, GS.currentMap.width - GAME_W);
    }

    function getPlatforms() {
      return GS.currentMap ? GS.currentMap.platforms : [];
    }

    function tryJump() {
      if (P.onGround) {
        P.vy = -P.jumpPower;
        P.onGround = false;
      }
    }

    function basicAttack() {
      if (P.attackCd > 0 || GS.scene !== 'play') return;

      P.attackCd = ATTACK_COOLDOWN;
      P.attackFlash = 7;

      const hitbox = {
        x:P.facing === 1 ? P.x + P.w - 2 : P.x - 48,
        y:P.y + 6,
        w:48,
        h:26
      };

      let hitAny = false;

      for (const m of MONSTERS) {
        if (m.dead) continue;
        if (rectsOverlap(hitbox, m)) {
          hitAny = true;
          const dmg = Math.max(1, P.atk - m.def + Math.floor(Math.random() * 4));
          m.hp -= dmg;
          m.hitFlash = 5;
          addFloatText(m.x + m.w / 2, m.y - 6, '-' + dmg, '#ffd25a');

          if (m.hp <= 0) {
            m.dead = true;
            addFloatText(m.x + m.w / 2, m.y - 18, '撃破!', '#55dd88');
            gainExp(m.exp);
            P.meso += m.meso;
          }
        }
      }

      if (!hitAny) {
        addFloatText(P.x + P.w / 2 + P.facing * 22, P.y - 4, 'miss', '#93a4cf');
      }
    }

    function gainExp(amount) {
      P.exp += amount;
      addFloatText(P.x + P.w / 2, P.y - 18, `+${amount} EXP`, '#7fe7ff');

      while (P.exp >= needExp(P.level)) {
        P.exp -= needExp(P.level);
        P.level += 1;
        P.maxHp += 12;
        P.maxMp += 6;
        P.atk += 2;
        P.def += 1;
        P.hp = P.maxHp;
        P.mp = P.maxMp;
        addFloatText(P.x + P.w / 2, P.y - 34, `LEVEL UP! Lv.${P.level}`, '#ffcc00');
        savePlayer();
      }
    }

    function damagePlayer(amount) {
      if (P.hurtCd > 0) return;

      const dmg = Math.max(1, amount - Math.floor(P.def * 0.35));
      P.hp -= dmg;
      P.hurtCd = HURT_COOLDOWN;
      addFloatText(P.x + P.w / 2, P.y - 10, '-' + dmg, '#ff7a7a');

      if (P.hp <= 0) {
        P.hp = P.maxHp;
        P.mp = P.maxMp;
        P.x = 200;
        P.y = 400;
        P.vx = 0;
        P.vy = 0;
        addFloatText(P.x + 20, P.y - 24, '気絶…拠点へ戻った', '#ffffff');
        loadMap(P.mapId || 'z01_m01', 200, 400);
      }
    }

    function updatePlayer() {
      if (GS.scene !== 'play' || !GS.currentMap) return;

      if (P.attackCd > 0) P.attackCd--;
      if (P.hurtCd > 0) P.hurtCd--;
      if (P.attackFlash > 0) P.attackFlash--;

      let dx = 0;
      if (KEY['ArrowLeft'] || KEY['KeyA'] || VK.left) dx = -P.speed;
      if (KEY['ArrowRight'] || KEY['KeyD'] || VK.right) dx = P.speed;

      if (dx !== 0) P.facing = dx > 0 ? 1 : -1;

      if ((KEY['Space'] || KEY['KeyW'] || KEY['ArrowUp'] || VK.jump) && !VK._jp) {
        tryJump();
      }
      VK._jp = !!(KEY['Space'] || KEY['KeyW'] || KEY['ArrowUp'] || VK.jump);

      if ((KEY['KeyJ'] || KEY['KeyK'] || KEY['KeyX'] || VK.attack) && !VK._ap) {
        basicAttack();
      }
      VK._ap = !!(KEY['KeyJ'] || KEY['KeyK'] || KEY['KeyX'] || VK.attack);

      P.vx = dx;
      P.x += P.vx;
      P.x = clamp(P.x, 0, GS.currentMap.width - P.w);

      P.vy += GRAVITY;
      if (P.vy > MAX_FALL) P.vy = MAX_FALL;
      P.y += P.vy;

      P.onGround = false;
      const plats = getPlatforms();

      for (const pf of plats) {
        if (
          P.x + P.w > pf.x &&
          P.x < pf.x + pf.w &&
          P.y + P.h >= pf.y &&
          P.y + P.h - P.vy <= pf.y &&
          P.vy >= 0
        ) {
          P.y = pf.y - P.h;
          P.vy = 0;
          P.onGround = true;
        }
      }

      if (P.y > GAME_H + 150) {
        P.hp = Math.max(1, P.hp - 10);
        P.x = 200;
        P.y = 400;
        P.vx = 0;
        P.vy = 0;
      }

      for (const po of GS.currentMap.portals) {
        if (nowMs() < GS.portalLockUntil) continue;
        if (rectsOverlap(P, po)) {
          GS.portalLockUntil = nowMs() + 900;
          loadMap(po.to, po.tx, po.ty);
          savePlayer();
          break;
        }
      }

      updateCamera();
    }

    function updateMonsters() {
      if (GS.scene !== 'play') return;

      for (const m of MONSTERS) {
        if (m.dead) continue;
        if (m.hitFlash > 0) m.hitFlash--;

        m.x += m.speed * m.facing;
        if (m.x < m.minX) {
          m.x = m.minX;
          m.facing = 1;
        }
        if (m.x + m.w > m.maxX) {
          m.x = m.maxX - m.w;
          m.facing = -1;
        }

        if (rectsOverlap(P, m)) {
          damagePlayer(m.atk);
        }
      }

      MONSTERS = MONSTERS.filter(m => !m.dead);
    }

    function updateHitTexts() {
      GS.hitTexts.forEach(t => {
        t.y -= 0.6;
        t.life--;
      });
      GS.hitTexts = GS.hitTexts.filter(t => t.life > 0);
    }

    function updateAutosave(ts) {
      if (GS.scene !== 'play') return;
      if (!GS.autosaveAt) GS.autosaveAt = ts + 20000;
      if (ts >= GS.autosaveAt) {
        savePlayer();
        GS.autosaveAt = ts + 20000;
      }
    }

    function drawCreateScene() {
      CTX.fillStyle = '#0a0c16';
      CTX.fillRect(0, 0, GAME_W, GAME_H);

      CTX.fillStyle = '#ffcc00';
      CTX.font = 'bold 26px Courier New';
      CTX.textAlign = 'center';
      CTX.fillText('キャラクター作成', GAME_W / 2, 130);

      CTX.fillStyle = '#a8afc9';
      CTX.font = '14px Courier New';
      CTX.fillText('名前入力UIを表示中...', GAME_W / 2, 170);
      CTX.textAlign = 'left';
    }

    function drawSky(map) {
      const g = CTX.createLinearGradient(0, 0, 0, GAME_H);
      g.addColorStop(0, map.skyTop);
      g.addColorStop(1, map.skyBottom);
      CTX.fillStyle = g;
      CTX.fillRect(0, 0, GAME_W, GAME_H);

      CTX.fillStyle = map.haze;
      CTX.globalAlpha = 0.08;
      for (let i = 0; i < 5; i++) {
        CTX.beginPath();
        CTX.arc((i * 220 + 90) - (GS.cameraX * 0.2 % 120), 110 + (i % 2) * 30, 120, 0, Math.PI * 2);
        CTX.fill();
      }
      CTX.globalAlpha = 1;
    }

    function drawParallax() {
      CTX.save();
      CTX.translate(-GS.cameraX * 0.35, 0);
      CTX.fillStyle = 'rgba(0,0,0,.18)';
      for (let i = 0; i < 20; i++) {
        const x = i * 180;
        CTX.beginPath();
        CTX.moveTo(x, GAME_H);
        CTX.lineTo(x + 70, 320 + (i % 3) * 20);
        CTX.lineTo(x + 150, GAME_H);
        CTX.closePath();
        CTX.fill();
      }
      CTX.restore();
    }

    function drawPlatforms(map) {
      for (const pf of map.platforms) {
        const x = pf.x - GS.cameraX;
        const y = pf.y;
        if (x + pf.w < 0 || x > GAME_W) continue;

        if (pf.type === 'ground') {
          CTX.fillStyle = map.ground;
          CTX.fillRect(x, y, pf.w, pf.h);
          CTX.fillStyle = map.dirt;
          CTX.fillRect(x, y + 12, pf.w, pf.h - 12);
        } else if (pf.type === 'wood') {
          CTX.fillStyle = '#8a623a';
          CTX.fillRect(x, y, pf.w, pf.h);
          CTX.fillStyle = '#a87a46';
          CTX.fillRect(x, y, pf.w, 4);
        } else {
          CTX.fillStyle = '#6d727f';
          CTX.fillRect(x, y, pf.w, pf.h);
          CTX.fillStyle = '#8a91a1';
          CTX.fillRect(x, y, pf.w, 4);
        }
      }
    }

    function drawPortals(map) {
      for (const po of map.portals) {
        const x = po.x - GS.cameraX;
        if (x + po.w < 0 || x > GAME_W) continue;

        CTX.fillStyle = 'rgba(120,200,255,.18)';
        CTX.fillRect(x, po.y, po.w, po.h);
        CTX.strokeStyle = 'rgba(120,200,255,.65)';
        CTX.strokeRect(x, po.y, po.w, po.h);
      }
    }

    function drawMonsters() {
      for (const m of MONSTERS) {
        const x = Math.floor(m.x - GS.cameraX);
        const y = Math.floor(m.y);
        if (x + m.w < 0 || x > GAME_W) continue;

        CTX.fillStyle = m.hitFlash > 0 ? '#ffffff' : m.color;
        CTX.fillRect(x, y, m.w, m.h);

        CTX.fillStyle = 'rgba(0,0,0,.5)';
        CTX.fillRect(x, y - 8, m.w, 4);
        CTX.fillStyle = '#ff6666';
        CTX.fillRect(x, y - 8, m.w * (m.hp / m.maxHp), 4);
      }
    }

    function drawPlayer() {
      const px = Math.floor(P.x - GS.cameraX);
      const py = Math.floor(P.y);

      CTX.fillStyle = P.hurtCd > 0 ? '#ff9090' : '#ffe7a8';
      CTX.fillRect(px, py, P.w, P.h);

      CTX.fillStyle = '#222';
      if (P.facing === 1) CTX.fillRect(px + 18, py + 12, 4, 4);
      else CTX.fillRect(px + 6, py + 12, 4, 4);

      if (P.attackFlash > 0) {
        CTX.fillStyle = 'rgba(255,220,120,.35)';
        if (P.facing === 1) CTX.fillRect(px + P.w - 2, py + 6, 46, 26);
        else CTX.fillRect(px - 46, py + 6, 46, 26);
      }
    }

    function drawHitTexts() {
      CTX.font = 'bold 14px Courier New';
      CTX.textAlign = 'center';
      for (const t of GS.hitTexts) {
        CTX.globalAlpha = Math.max(0, t.life / 42);
        CTX.fillStyle = t.color;
        CTX.fillText(t.text, t.x - GS.cameraX, t.y);
      }
      CTX.globalAlpha = 1;
      CTX.textAlign = 'left';
    }

    function drawHUD() {
      CTX.fillStyle = 'rgba(0,0,0,.45)';
      CTX.fillRect(16, 16, 220, 64);

      CTX.fillStyle = '#ffffff';
      CTX.font = '12px Courier New';
      CTX.fillText(`${P.name || 'NO NAME'}  Lv.${P.level}  ${P.job}`, 24, 34);

      CTX.fillStyle = '#331116';
      CTX.fillRect(24, 42, 180, 10);
      CTX.fillStyle = '#ff5a68';
      CTX.fillRect(24, 42, 180 * (P.hp / P.maxHp), 10);
      CTX.strokeStyle = 'rgba(255,255,255,.15)';
      CTX.strokeRect(24, 42, 180, 10);

      CTX.fillStyle = '#111b33';
      CTX.fillRect(24, 58, 180, 8);
      CTX.fillStyle = '#4a8dff';
      CTX.fillRect(24, 58, 180 * (P.mp / P.maxMp), 8);
      CTX.strokeStyle = 'rgba(255,255,255,.12)';
      CTX.strokeRect(24, 58, 180, 8);

      const need = needExp(P.level);
      CTX.fillStyle = 'rgba(0,0,0,.45)';
      CTX.fillRect(250, 16, 220, 24);
      CTX.fillStyle = '#3a2d00';
      CTX.fillRect(258, 24, 180, 8);
      CTX.fillStyle = '#ffcc00';
      CTX.fillRect(258, 24, 180 * (P.exp / need), 8);
      CTX.strokeStyle = 'rgba(255,255,255,.12)';
      CTX.strokeRect(258, 24, 180, 8);
      CTX.fillStyle = '#d8dcef';
      CTX.fillText(`EXP ${P.exp} / ${need}`, 258, 20);

      if (GS.currentMap) {
        CTX.fillStyle = 'rgba(0,0,0,.42)';
        CTX.fillRect(GAME_W - 230, 16, 214, 54);
        CTX.fillStyle = '#ffcc00';
        CTX.fillText(`MAP: ${GS.currentMap.name}`, GAME_W - 220, 34);
        CTX.fillStyle = '#d8dcef';
        CTX.fillText(`MESO: ${P.meso}`, GAME_W - 220, 52);
      }
    }

    function drawMapScene() {
      const map = GS.currentMap;
      if (!map) {
        CTX.fillStyle = '#000';
        CTX.fillRect(0, 0, GAME_W, GAME_H);
        return;
      }

      drawSky(map);
      drawParallax();
      drawPlatforms(map);
      drawPortals(map);
      drawMonsters();
      drawPlayer();
      drawHitTexts();
      drawHUD();
    }

    // -----------------------------------------
    // Game Loop
    // -----------------------------------------
    function gameLoop(ts) {
      if (!CVS || !CTX) return;

      if (GS.scene === 'login') {
        drawLoginScene();
      } else if (GS.scene === 'create') {
        drawCreateScene();
      } else if (GS.scene === 'play') {
        updatePlayer();
        updateMonsters();
        updateHitTexts();
        updateAutosave(ts);
        drawMapScene();
      }

      requestAnimationFrame(gameLoop);
    }

    // -----------------------------------------
    // Boot
    // -----------------------------------------
    window.addEventListener('DOMContentLoaded', () => {
      initCanvas();
      initSB();
      loadPlayerFromLocal();

      GS.scene = 'login';
      showLoginUI();

      requestAnimationFrame(gameLoop);
    });

    window.addEventListener('beforeunload', () => {
      savePlayerToLocal();
    });
  </script>
</body>
</html>
